name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: patent-hub
            asset: patent-hub-linux-x86_64.tar.gz
          - os: windows-latest
            artifact: patent-hub.exe
            asset: patent-hub-windows-x86_64.zip
          - os: macos-latest
            artifact: patent-hub
            asset: patent-hub-macos-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p pkg
          cp target/release/${{ matrix.artifact }} pkg/
          cp -r templates static .env.example README.md LICENSE pkg/
          echo '#!/bin/bash' > pkg/start.sh
          echo './patent-hub' >> pkg/start.sh
          chmod +x pkg/start.sh pkg/patent-hub
          cd pkg && tar czf ../${{ matrix.asset }} *

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path pkg -Force
          Copy-Item target/release/${{ matrix.artifact }} pkg/
          Copy-Item -Recurse templates, static pkg/
          Copy-Item .env.example, README.md, LICENSE, start.bat pkg/
          Compress-Archive -Path pkg/* -DestinationPath ${{ matrix.asset }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
