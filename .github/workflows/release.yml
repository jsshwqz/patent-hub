name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: patent-hub
            asset_name: patent-hub-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: patent-hub.exe
            asset_name: patent-hub-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: patent-hub
            asset_name: patent-hub-macos-x86_64.tar.gz
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true
    
    - name: Build release
      run: cargo build --release
    
    - name: Create release directory
      run: |
        mkdir -p release-package
        cp target/release/${{ matrix.artifact_name }} release-package/
        cp -r templates static .env.example README.md LICENSE release-package/
      shell: bash
    
    - name: Create start script (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        echo '@echo off' > release-package/start.bat
        echo 'chcp 65001 >nul' >> release-package/start.bat
        echo 'echo Starting Patent Hub...' >> release-package/start.bat
        echo 'if not exist .env copy .env.example .env' >> release-package/start.bat
        echo 'patent-hub.exe' >> release-package/start.bat
        echo 'pause' >> release-package/start.bat
      shell: bash
    
    - name: Create start script (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        echo '#!/bin/bash' > release-package/start.sh
        echo 'echo "Starting Patent Hub..."' >> release-package/start.sh
        echo '[ ! -f .env ] && cp .env.example .env' >> release-package/start.sh
        echo './patent-hub' >> release-package/start.sh
        chmod +x release-package/start.sh
        chmod +x release-package/patent-hub
      shell: bash
    
    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cd release-package
        tar czf ../${{ matrix.asset_name }} *
      shell: bash
    
    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        Compress-Archive -Path release-package/* -DestinationPath ${{ matrix.asset_name }}
      shell: pwsh
    
    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
