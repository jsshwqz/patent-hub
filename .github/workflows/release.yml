name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: patent-hub-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: patent-hub-linux-aarch64.tar.gz
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: patent-hub-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: patent-hub-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: patent-hub-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # cross 用于 Linux aarch64 交叉编译
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      # ── Package Unix ──────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p pkg
          cp "$BIN_DIR/patent-hub"    pkg/
          cp "$BIN_DIR/skill-router"  pkg/
          cp -r templates static .env.example pkg/
          [ -f README.md ] && cp README.md pkg/ || true
          [ -f LICENSE ] && cp LICENSE pkg/ || true

          cat > pkg/start.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./patent-hub
          EOF
          chmod +x pkg/start.sh pkg/patent-hub pkg/skill-router

          cat > pkg/USAGE.txt << 'EOF'
          # Patent Hub + Skill Router

          ## Start web server
            ./start.sh
            # or: ./patent-hub

          ## Use skill-router CLI
            ./skill-router "parse this yaml"
            ./skill-router -c text_summarize -x '{"text":"hello world"}' summarize
            ./skill-router --gc --days 30

          ## Configure
            cp .env.example .env
            # Edit .env with your API keys
          EOF

          cd pkg && tar czf "../${{ matrix.asset }}" .

      # ── Package Windows ───────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "target\${{ matrix.target }}\release"
          New-Item -ItemType Directory -Path pkg -Force | Out-Null
          Copy-Item "$binDir\patent-hub.exe"   pkg\
          Copy-Item "$binDir\skill-router.exe" pkg\
          Copy-Item -Recurse templates, static pkg\
          Copy-Item .env.example pkg\
          if (Test-Path README.md) { Copy-Item README.md pkg\ }
          if (Test-Path LICENSE) { Copy-Item LICENSE pkg\ }

          @'
          @echo off
          cd /d "%~dp0"
          patent-hub.exe
          '@ | Set-Content pkg\start.bat -Encoding ASCII

          @'
          # Patent Hub + Skill Router

          ## Start web server
            start.bat
            or: patent-hub.exe

          ## Use skill-router CLI
            skill-router.exe "parse this yaml"
            skill-router.exe -c text_summarize -x "{\"text\":\"hello world\"}" summarize
            skill-router.exe --gc --days 30

          ## Configure
            copy .env.example .env
            Edit .env with your API keys
          '@ | Set-Content pkg\USAGE.txt -Encoding UTF8

          Compress-Archive -Path pkg\* -DestinationPath "${{ matrix.asset }}" -Force

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: true

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli

      - name: Build Android APK
        working-directory: mobile
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: |
          # Build for ARM64 (phones) and x86_64 (emulators/ChromeBook)
          dx build --platform android --release --target aarch64-linux-android
          # Rename ARM64 APK
          ARM_APK=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$ARM_APK" ]; then cp "$ARM_APK" ../patent-hub-android-arm64.apk; fi
          # Build x86_64 version
          dx build --platform android --release --target x86_64-linux-android
          X86_APK=$(find . -name "*.apk" -newer ../patent-hub-android-arm64.apk -type f | head -1)
          if [ -n "$X86_APK" ]; then cp "$X86_APK" ../patent-hub-android-x86_64.apk; fi

      - name: Sign APK
        run: |
          # Generate a release keystore for signing
          keytool -genkeypair -v \
            -keystore patent-hub.keystore \
            -alias patent-hub \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass patent-hub-2024 \
            -keypass patent-hub-2024 \
            -dname "CN=Patent Hub, OU=Dev, O=Patent Hub, L=SZ, ST=GD, C=CN"
          # Find and sign all APKs
          for apk in $(find . -name "*.apk" -type f); do
            echo "Signing: $apk"
            # Align the APK
            ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -f 4 "$apk" "${apk}.aligned"
            mv "${apk}.aligned" "$apk"
            # Sign with apksigner
            ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
              --ks patent-hub.keystore \
              --ks-key-alias patent-hub \
              --ks-pass pass:patent-hub-2024 \
              --key-pass pass:patent-hub-2024 \
              "$apk"
            echo "Signed: $apk"
          done

      - name: Find APK
        id: find-apk
        run: |
          echo "Searching for APK files..."
          ls -la patent-hub-android-*.apk 2>/dev/null
          if [ -f "patent-hub-android-arm64.apk" ] || [ -f "patent-hub-android-x86_64.apk" ]; then
            echo "apk_found=true" >> $GITHUB_OUTPUT
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK
        if: steps.find-apk.outputs.apk_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            patent-hub-android-arm64.apk
            patent-hub-android-x86_64.apk
