name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: innoforge-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: innoforge-linux-aarch64.tar.gz
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: innoforge-windows-x86_64.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: innoforge-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: innoforge-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # cross 用于 Linux aarch64 交叉编译
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      # ── Package Unix ──────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN_DIR="target/${{ matrix.target }}/release"
          mkdir -p pkg
          cp "$BIN_DIR/innoforge"    pkg/
          if [ -f "$BIN_DIR/skill-router" ]; then
            cp "$BIN_DIR/skill-router" pkg/
          fi
          cp -r templates static .env.example pkg/
          [ -f README.md ] && cp README.md pkg/ || true
          [ -f LICENSE ] && cp LICENSE pkg/ || true

          cat > pkg/start.sh << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          ./innoforge
          EOF
          chmod +x pkg/start.sh pkg/innoforge
          [ -f pkg/skill-router ] && chmod +x pkg/skill-router || true

          cat > pkg/USAGE.txt << 'EOF'
          # InnoForge 创研台 + Skill Router / 使用说明

          ## 启动 Web 服务器 / Start web server
            ./start.sh
            # 或 / or: ./innoforge

          ## Skill Router 命令行 / CLI
            ./skill-router "parse this yaml"
            ./skill-router -c text_summarize -x '{"text":"hello world"}' summarize
            ./skill-router --gc --days 30

          ## 配置 / Configure
            cp .env.example .env
            # 编辑 .env 填入 API 密钥 / Edit .env with your API keys
          EOF

          cd pkg && tar czf "../${{ matrix.asset }}" .

      # ── Package Windows ───────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = "target\${{ matrix.target }}\release"
          New-Item -ItemType Directory -Path pkg -Force | Out-Null
          Copy-Item "$binDir\innoforge.exe"   pkg\
          if (Test-Path "$binDir\skill-router.exe") { Copy-Item "$binDir\skill-router.exe" pkg\ }
          Copy-Item -Recurse templates, static pkg\
          Copy-Item .env.example pkg\
          if (Test-Path README.md) { Copy-Item README.md pkg\ }
          if (Test-Path LICENSE) { Copy-Item LICENSE pkg\ }

          @'
          @echo off
          cd /d "%~dp0"
          innoforge.exe
          '@ | Set-Content pkg\start.bat -Encoding ASCII

          @'
          # InnoForge 创研台 + Skill Router / 使用说明

          ## 启动 Web 服务器 / Start web server
            start.bat
            或 / or: innoforge.exe

          ## Skill Router 命令行 / CLI
            skill-router.exe "parse this yaml"
            skill-router.exe -c text_summarize -x "{\"text\":\"hello world\"}" summarize
            skill-router.exe --gc --days 30

          ## 配置 / Configure
            copy .env.example .env
            编辑 .env 填入 API 密钥 / Edit .env with your API keys
          '@ | Set-Content pkg\USAGE.txt -Encoding UTF8

          Compress-Archive -Path pkg\* -DestinationPath "${{ matrix.asset }}" -Force

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          generate_release_notes: false

  # ── 同步 Release 到 Gitee ─────────────────────────────────────────────
  sync-gitee:
    name: Sync Release to Gitee
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download all assets from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ steps.tag.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --dir assets || true
          ls -la assets/

      - name: Create Gitee Release and upload assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # 创建 Gitee Release
          RELEASE_RESP=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/jsshwqz/innoforge/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": \"从 GitHub Actions 自动同步。详细更新日志见 CHANGELOG.md\",
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RELEASE_RESP" | jq -r '.id')
          echo "Gitee Release ID: $RELEASE_ID"

          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "::warning::Failed to create Gitee release, response: $RELEASE_RESP"
            exit 0
          fi

          # 上传所有构建产物
          for file in assets/*; do
            [ -f "$file" ] || continue
            echo "Uploading $(basename "$file")..."
            curl -s -X POST \
              "https://gitee.com/api/v5/repos/jsshwqz/innoforge/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${file}"
            echo ""
          done

          echo "✅ Gitee release synced: ${TAG}"

  # ── 移动端 / 桌面端构建已移至独立仓库 ──────────────────────────────────
  # Android:   已拆出（cdylib 不再在主仓编译）
  # iOS:       https://gitee.com/jsshwqz/innoforge-ios
  # HarmonyOS: https://gitee.com/jsshwqz/innoforge-harmony
  # Desktop:   https://gitee.com/jsshwqz/innoforge-desktop
