<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创研台 InnoForge</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        .hero { text-align: center; padding: 40px 20px 20px; }
        .hero h1 { font-size: 2.2em; margin-bottom: 8px; }
        .hero .subtitle { color: #8b949e; font-size: 1.1em; margin-bottom: 30px; }

        /* 主入口区域 */
        .main-entry { max-width: 700px; margin: 0 auto 40px; }
        .idea-input-area {
            background: #161b22; border: 1px solid #30363d; border-radius: 12px;
            padding: 24px; margin-bottom: 20px;
        }
        .idea-input-area label {
            display: block; color: #c9d1d9; font-size: 1em;
            margin-bottom: 10px; font-weight: 500;
        }
        .idea-input-area textarea {
            width: 100%; min-height: 100px; background: #0d1117;
            border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9;
            padding: 12px; font-size: 0.95em; resize: vertical;
            font-family: inherit; line-height: 1.6;
        }
        .idea-input-area textarea:focus { outline: none; border-color: #58a6ff; }
        .idea-input-area textarea::placeholder { color: #484f58; }

        .start-buttons {
            display: flex; gap: 12px; justify-content: center; margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: #238636; color: white; border: none; padding: 12px 28px;
            border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: 500;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary {
            background: transparent; color: #58a6ff; border: 1px solid #30363d;
            padding: 12px 28px; border-radius: 8px; font-size: 1em; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: #161b22; border-color: #58a6ff; }

        /* 流程指引 */
        .workflow-hint {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; color: #484f58; font-size: 0.85em; margin: 20px 0;
            flex-wrap: wrap;
        }
        .workflow-hint .step {
            background: #161b22; border: 1px solid #21262d; border-radius: 16px;
            padding: 4px 12px; white-space: nowrap;
        }
        .workflow-hint .arrow { color: #30363d; }

        /* 快速抓取（折叠） */
        .quick-fetch {
            max-width: 700px; margin: 0 auto 30px; padding: 0 20px;
        }
        .quick-fetch summary {
            color: #8b949e; cursor: pointer; font-size: 0.9em;
            padding: 8px 0; user-select: none;
        }
        .quick-fetch summary:hover { color: #c9d1d9; }
        .fetch-box {
            display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
        }
        .fetch-box input, .fetch-box select {
            background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
            padding: 8px 12px; border-radius: 6px; font-size: 0.9em;
        }
        .fetch-box input { flex: 1; min-width: 200px; }
        .fetch-box button {
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }
        .fetch-box button:hover { background: #30363d; }

        /* 文件上传区 */
        .upload-zone {
            border: 1px dashed #30363d; border-radius: 8px; padding: 12px;
            text-align: center; color: #484f58; font-size: 0.85em;
            cursor: pointer; transition: all 0.2s; margin-top: 10px;
        }
        .upload-zone:hover { border-color: #58a6ff; color: #8b949e; }
        .upload-zone.dragover { border-color: #58a6ff; background: rgba(88,166,255,0.05); }
        .upload-zone input[type="file"] { display: none; }
        .file-list {
            margin-top: 8px; text-align: left; font-size: 0.85em;
        }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
            padding: 6px 10px; margin-top: 4px; color: #8b949e;
        }
        .file-item .remove {
            color: #f85149; cursor: pointer; font-size: 0.9em;
            background: none; border: none; padding: 2px 6px;
        }

        /* 模式选择 */
        .mode-toggle {
            display: flex; gap: 0; margin-bottom: 12px; border-radius: 8px;
            overflow: hidden; border: 1px solid #30363d;
        }
        .mode-btn {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            background: #0d1117; color: #8b949e; border: none; font-size: 0.9em;
            transition: all 0.2s;
        }
        .mode-btn.active { background: #161b22; color: #58a6ff; font-weight: 500; }
        .mode-btn:hover:not(.active) { background: #161b22; }
        .mode-hint {
            color: #484f58; font-size: 0.8em; text-align: center;
            margin-bottom: 8px; min-height: 20px;
        }
    </style>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <main class="hero page-main">
        <h1>创研台</h1>
        <p class="subtitle">从想法到落地 · 决策依据 · 执行方案 · 知识产权保护</p>

        <!-- 研发流程指引 -->
        <div class="workflow-hint">
            <span class="step">描述想法</span>
            <span class="arrow">&rarr;</span>
            <span class="step">AI 分析推演</span>
            <span class="arrow">&rarr;</span>
            <span class="step">全网技术调研</span>
            <span class="arrow">&rarr;</span>
            <span class="step">可行性报告</span>
        </div>

        <!-- 主入口：描述你的想法 -->
        <div class="main-entry">
            <div class="idea-input-area">
                <label>描述你的技术想法或创新方案</label>
                <textarea id="idea-input" placeholder="例如：一种基于液态金属的手机散热方案，利用镓铟合金的高导热性，在手机内部形成微循环散热通道...

支持粘贴文字，也可以拖入文件。越详细，AI 验证越准确。"></textarea>

                <!-- 文件上传区 -->
                <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" multiple accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg,.gif,.bmp,.webp">
                    拖拽文件到此处，或点击上传（PDF / Word / 图片 / 文本）
                </div>
                <div class="file-list" id="file-list"></div>

                <!-- 模式选择 -->
                <div class="mode-toggle">
                    <button class="mode-btn active" onclick="setMode('chat')" id="mode-chat">AI 对话梳理</button>
                    <button class="mode-btn" onclick="setMode('quick')" id="mode-quick">快速推演</button>
                    <button class="mode-btn" onclick="setMode('deep')" id="mode-deep">深度推演</button>
                </div>
                <div class="mode-hint" id="mode-hint">先与 AI 对话，梳理技术方案、拆解创新点，确认后再验证</div>

                <div class="start-buttons">
                    <button class="btn-primary" onclick="startFlow()" id="start-btn">开始对话</button>
                    <button class="btn-secondary" onclick="window.location.href='/idea'">历史项目</button>
                </div>
            </div>
        </div>

        <!-- 服务状态 -->
        <div id="service-status" style="max-width:700px;margin:0 auto 20px;padding:0 20px;">
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;font-size:0.85em;">
                <a href="/settings?from=/" id="status-ai" style="text-decoration:none;color:#8b949e;background:#161b22;border:1px solid #21262d;border-radius:16px;padding:4px 14px;cursor:pointer;transition:all 0.2s;"></a>
                <a href="/settings?from=/" id="status-search" style="text-decoration:none;color:#8b949e;background:#161b22;border:1px solid #21262d;border-radius:16px;padding:4px 14px;cursor:pointer;transition:all 0.2s;"></a>
            </div>
        </div>

        <!-- 最近项目 -->
        <div id="recent-ideas" style="max-width:700px;margin:0 auto 30px;padding:0 20px;display:none;">
            <h3 style="color:#c9d1d9;font-size:0.95em;margin-bottom:10px;">最近项目</h3>
            <div id="recent-list" style="display:flex;flex-direction:column;gap:6px;"></div>
        </div>

        <!-- 快速抓取（折叠，不抢焦点） -->
        <div class="quick-fetch">
            <details>
                <summary>快速导入技术文献（输入专利号或文献编号）</summary>
                <div class="fetch-box">
                    <input type="text" id="fetch-number" placeholder="输入专利号 (如 EP1234567, US10000000)">
                    <select id="fetch-source">
                        <option value="epo">EPO (欧洲/全球)</option>
                        <option value="uspto">USPTO (美国)</option>
                    </select>
                    <button onclick="fetchPatent()">抓取</button>
                </div>
                <div id="fetch-result"></div>
            </details>
        </div>
    </main>

    <footer style="text-align:center;padding:20px;color:#484f58;font-size:0.75em;">
        v0.5.3 · <a href="https://github.com/jsshwqz/innoforge" target="_blank" rel="noopener" style="color:#484f58;">GitHub</a> · <a href="https://gitee.com/jsshwqz/innoforge" target="_blank" rel="noopener" style="color:#484f58;">Gitee</a> · MIT License
    </footer>
    </main>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>

    <script src="/static/i18n.js"></script>
    <script>
    renderNavbar('home');
    renderSidebar(
      '<div class="sidebar-section">'
      + '<div class="sidebar-label">推演模式</div>'
      + '<button class="sidebar-btn primary" id="sb-mode-chat" onclick="setMode(\'chat\')">对话梳理</button>'
      + '<button class="sidebar-btn" id="sb-mode-quick" onclick="setMode(\'quick\')">快速推演</button>'
      + '<button class="sidebar-btn" id="sb-mode-deep" onclick="setMode(\'deep\')">深度推演</button>'
      + '</div>'
    );
    applyI18nCommon();
    </script>
    <script>
    let currentMode = 'chat';
    let uploadedFiles = [];

    // 模式切换
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('mode-' + mode).classList.add('active');
        // Sync sidebar buttons
        ['chat','quick','deep'].forEach(function(m) {
            var sb = document.getElementById('sb-mode-' + m);
            if (sb) { sb.className = 'sidebar-btn' + (m === mode ? ' primary' : ''); }
        });
        const hints = {
            chat: '先与 AI 对话，梳理技术方案、拆解创新点，确认后再推演',
            quick: '跳过对话，直接运行 6 步快速推演（约 30 秒）',
            deep: '跳过对话，直接运行 13 步深度推演（约 2-5 分钟）'
        };
        const btnTexts = { chat: '开始对话', quick: '快速推演', deep: '深度推演' };
        document.getElementById('mode-hint').textContent = hints[mode];
        document.getElementById('start-btn').textContent = btnTexts[mode];
    }

    // 文件上传
    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => addFiles(fileInput.files));

    // 粘贴图片支持
    document.getElementById('idea-input').addEventListener('paste', e => {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        let hasImage = false;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                hasImage = true;
                const blob = items[i].getAsFile();
                const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const ext = blob.type.split('/')[1] || 'png';
                const file = new File([blob], 'paste-' + ts + '.' + ext, { type: blob.type });
                if (uploadedFiles.length < 5) {
                    uploadedFiles.push(file);
                } else {
                    alert('最多上传 5 个文件');
                }
            }
        }
        if (hasImage) {
            e.preventDefault();
            renderFileList();
        }
    });

    function addFiles(fileList) {
        for (const f of fileList) {
            if (f.size > 10 * 1024 * 1024) { alert(f.name + ' 超过 10MB 限制'); continue; }
            if (uploadedFiles.length >= 5) { alert('最多上传 5 个文件'); break; }
            uploadedFiles.push(f);
        }
        renderFileList();
    }

    function removeFile(idx) {
        uploadedFiles.splice(idx, 1);
        renderFileList();
    }

    function renderFileList() {
        const el = document.getElementById('file-list');
        if (uploadedFiles.length === 0) { el.innerHTML = ''; return; }
        el.innerHTML = '';
        uploadedFiles.forEach((f, i) => {
            const size = f.size < 1024 ? f.size + 'B' : (f.size / 1024).toFixed(1) + 'KB';
            const icon = f.type.startsWith('image/') ? '🖼' : f.name.endsWith('.pdf') ? '📄' : '📎';
            const item = document.createElement('div');
            item.className = 'file-item';
            const span = document.createElement('span');
            span.textContent = icon + ' ' + f.name + ' (' + size + ')';
            const btn = document.createElement('button');
            btn.className = 'remove';
            btn.textContent = 'x';
            btn.setAttribute('onclick', 'removeFile(' + i + ')');
            item.appendChild(span);
            item.appendChild(btn);
            el.appendChild(item);
        });
    }

    // 主流程
    async function startFlow() {
        const text = document.getElementById('idea-input').value.trim();
        if (!text && uploadedFiles.length === 0) {
            document.getElementById('idea-input').focus();
            return;
        }

        const title = (text.split(/[。.!！?\n]/)[0] || '').substring(0, 50) || '新研发项目';
        let description = text;

        // 如果有文件，先上传提取内容追加到描述
        if (uploadedFiles.length > 0) {
            document.getElementById('start-btn').textContent = '上传文件中...';
            document.getElementById('start-btn').disabled = true;
            for (const f of uploadedFiles) {
                try {
                    const formData = new FormData();
                    formData.append('file', f);
                    const resp = await fetch('/api/upload/extract', {
                        method: 'POST', body: formData
                    });
                    if (!resp.ok) throw new Error('上传失败 (' + resp.status + ')');
                    const data = await resp.json();
                    if (data.text) {
                        description += '\n\n---附件: ' + f.name + '---\n' + data.text.substring(0, 3000);
                    }
                } catch(e) {
                    console.error('文件提取失败:', f.name, e);
                }
            }
            document.getElementById('start-btn').disabled = false;
        }

        // 提交创意
        try {
            const resp = await fetch('/api/idea/submit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ title, description, input_type: uploadedFiles.length > 0 ? 'mixed' : 'text' })
            });
            if (!resp.ok) { alert('服务器错误 (' + resp.status + ')'); return; }
            const data = await resp.json();
            if (!data.id) { alert(data.message || '提交失败'); return; }

            // 根据模式跳转
            if (currentMode === 'chat') {
                window.location.href = '/idea?id=' + data.id + '&mode=chat';
            } else if (currentMode === 'quick') {
                window.location.href = '/idea?id=' + data.id + '&autostart=quick';
            } else {
                window.location.href = '/idea?id=' + data.id + '&autostart=deep';
            }
        } catch(e) {
            alert('请求失败: ' + e);
        }
    }

    // Ctrl+Enter 提交
    document.getElementById('idea-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.ctrlKey) startFlow();
    });

    // 服务状态检测
    (async function checkStatus() {
        try {
            var resp = await fetch('/api/settings');
            var data = await resp.json();
            var aiEl = document.getElementById('status-ai');
            var searchEl = document.getElementById('status-search');
            if (data.ai_api_key_configured) {
                aiEl.textContent = '✅ AI 服务已配置';
                aiEl.style.color = '#3fb950';
            } else {
                aiEl.textContent = '⚠️ AI 未配置 — 点击设置';
                aiEl.style.color = '#d29922';
                aiEl.style.borderColor = '#d29922';
            }
            if (data.serpapi_key_configured || data.bing_api_key_configured || data.lens_api_key_configured) {
                searchEl.textContent = '✅ 在线搜索已配置';
                searchEl.style.color = '#3fb950';
            } else {
                searchEl.textContent = 'ℹ️ 在线搜索未配置（可用本地库）';
                searchEl.style.color = '#8b949e';
            }
        } catch(e) {}
    })();

    // 加载最近项目
    (async function loadRecentIdeas() {
        try {
            var resp = await fetch('/api/idea/list');
            if (!resp.ok) return;
            var data = await resp.json();
            var ideas = (data.ideas || data || []).slice(0, 5);
            if (ideas.length === 0) return;
            var container = document.getElementById('recent-ideas');
            var list = document.getElementById('recent-list');
            container.style.display = 'block';
            ideas.forEach(function(idea) {
                var a = document.createElement('a');
                a.href = '/idea?id=' + idea.id;
                a.style.cssText = 'display:flex;justify-content:space-between;align-items:center;background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px 14px;text-decoration:none;color:#c9d1d9;font-size:0.9em;transition:border-color 0.2s;';
                a.onmouseenter = function() { a.style.borderColor = '#58a6ff'; };
                a.onmouseleave = function() { a.style.borderColor = '#21262d'; };
                var left = document.createElement('div');
                left.style.cssText = 'display:flex;align-items:center;gap:8px;overflow:hidden;';
                var statusDot = document.createElement('span');
                var s = idea.status || '';
                var dotColor = s === 'completed' ? '#3fb950' : s === 'analyzing' ? '#d29922' : s === 'failed' ? '#f85149' : '#8b949e';
                statusDot.style.cssText = 'width:8px;height:8px;border-radius:50%;flex-shrink:0;background:' + dotColor;
                var title = document.createElement('span');
                title.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
                title.textContent = idea.title || '无标题';
                left.appendChild(statusDot);
                left.appendChild(title);
                var time = document.createElement('span');
                time.style.cssText = 'color:#484f58;font-size:0.85em;flex-shrink:0;margin-left:12px;';
                if (idea.created_at) {
                    var d = new Date(idea.created_at);
                    time.textContent = d.toLocaleDateString();
                }
                a.appendChild(left);
                a.appendChild(time);
                list.appendChild(a);
            });
        } catch(e) { console.error('加载最近项目失败', e); }
    })();

    // 快速抓取
    async function fetchPatent() {
        const num = document.getElementById('fetch-number').value;
        const source = document.getElementById('fetch-source').value;
        const el = document.getElementById('fetch-result');
        if (!num) return;
        el.innerHTML = '';
        var fetchingP = document.createElement('p');
        fetchingP.style.cssText = 'color:#8b949e;margin-top:8px;';
        fetchingP.textContent = '正在抓取...';
        el.appendChild(fetchingP);
        try {
            const resp = await fetch('/api/patent/fetch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({patent_number: num, source})
            });
            if (!resp.ok) throw new Error('服务器错误 (' + resp.status + ')');
            const data = await resp.json();
            if (data.status === 'ok') {
                el.innerHTML = '';
                var successP = document.createElement('p');
                successP.style.cssText = 'color:#3fb950;margin-top:8px;';
                successP.textContent = '已抓取: ' + (data.patent.title || num) + ' ';
                var detailLink = document.createElement('a');
                detailLink.href = '/patent/' + data.patent.id;
                detailLink.style.cssText = 'color:#58a6ff;margin-left:8px;';
                detailLink.textContent = '查看详情';
                successP.appendChild(detailLink);
                el.appendChild(successP);
            } else {
                el.innerHTML = '';
                var errP = document.createElement('p');
                errP.style.cssText = 'color:#f85149;margin-top:8px;';
                errP.textContent = data.message;
                el.appendChild(errP);
            }
        } catch(e) {
            el.innerHTML = '';
            var catchP = document.createElement('p');
            catchP.style.cssText = 'color:#f85149;margin-top:8px;';
            catchP.textContent = '请求失败: ' + e;
            el.appendChild(catchP);
        }
    }

    </script>
</body>
</html>
