<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手 - 研发助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">研发助手</a>
        <div class="nav-links">
            <a href="/idea" data-i18n="nav.idea"></a>
            <a href="/search" data-i18n="nav.search"></a>
            <a href="/compare" data-i18n="nav.compare"></a>
            <a href="/ai" class="active" data-i18n="nav.ai"></a>
            <a href="/settings?from=/ai" data-i18n="nav.settings"></a>
        </div>
    </nav>
    <main class="container">
        <div class="chat-container">
            <h2 style="margin-bottom:8px;" data-i18n="ai.title"></h2>
            <p class="hint" data-i18n="ai.hint"></p>
            <div style="text-align:right;margin-bottom:8px;">
                <select onchange="setI18nLang(this.value)" id="lang-switch" style="padding:4px 8px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="chat-box" id="chat-messages"></div>
            <div class="chat-input">
                <label id="web-search-toggle" style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:0.85em;color:#8b949e;white-space:nowrap;" title="开启后 AI 会先联网搜索最新资料再回答">
                    <input type="checkbox" id="web-search-cb" style="accent-color:#1f6feb;">
                    <span data-i18n="ai.webSearch"></span>
                </label>
                <input type="text" id="chat-msg" data-i18n-placeholder="ai.placeholder" autofocus>
                <button onclick="sendChat()" data-i18n="ai.send"></button>
            </div>
        </div>
    </main>
    <script src="/static/i18n.js"></script>
    <script>
    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    var chatHistory = [];

    document.getElementById('chat-msg').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendChat();
    });
    async function sendChat() {
        var input = document.getElementById('chat-msg');
        var msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        var box = document.getElementById('chat-messages');
        var userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.textContent = msg;
        box.appendChild(userDiv);
        var loadingId = 'ai-' + Date.now();
        var aiDiv = document.createElement('div');
        aiDiv.className = 'msg ai';
        aiDiv.id = loadingId;
        aiDiv.textContent = document.getElementById('web-search-cb').checked ? t('ai.searching') : t('ai.thinking');
        box.appendChild(aiDiv);
        box.scrollTop = box.scrollHeight;
        try {
            var resp = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg, history: chatHistory, web_search: document.getElementById('web-search-cb').checked })
            });
            var data = await resp.json();
            document.getElementById(loadingId).innerHTML = DOMPurify.sanitize(escapeHtml(data.content).replace(/\n/g, '<br>'));
            chatHistory.push(["user", msg]);
            chatHistory.push(["assistant", data.content]);
        } catch(e) {
            var el = document.getElementById(loadingId);
            el.textContent = t('ai.fail') + ': ' + e;
            el.classList.add('error');
        }
        box.scrollTop = box.scrollHeight;
    }
    document.getElementById('lang-switch').value = i18nLang;
    applyI18nCommon();
    </script>
</body>
</html>
