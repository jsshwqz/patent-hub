<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案对比 - 研发助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
</head>
<body>
    <nav id="global-nav"></nav>
    <style>
    .compare-layout { max-width: 1600px; }
    @media (min-width: 1200px) {
        .compare-layout { display: grid; grid-template-columns: 360px 1fr; gap: 24px; align-items: start; }
        .compare-layout h2 { grid-column: 1 / -1; }
    }
    .compare-input-panel { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
    .compare-input-panel label { display: block; margin-bottom: 6px; color: #8b949e; }
    .compare-input-panel input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; margin-bottom: 16px; }
    </style>
    <main class="container compare-layout">
        <h2 data-i18n="compare.title" style="margin-bottom:16px;"></h2>
        <div class="compare-input-panel">
            <label data-i18n="compare.patent1"></label>
            <input type="text" id="patent1" data-i18n-placeholder="compare.placeholder1">
            <label data-i18n="compare.patent2"></label>
            <input type="text" id="patent2" data-i18n-placeholder="compare.placeholder2">
            <button onclick="comparePatents()" style="width:100%;padding:12px;background:#58a6ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:16px;" data-i18n="compare.btn"></button>
        </div>
        <div id="result"></div>
    </main>
    <script src="/static/i18n.js"></script>
    <script>
    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    async function comparePatents() {
        var id1 = document.getElementById('patent1').value.trim();
        var id2 = document.getElementById('patent2').value.trim();
        if (!id1 || !id2) {
            alert(t('compare.alert'));
            return;
        }
        var el = document.getElementById('result');
        el.innerHTML = '<div style="padding:20px;background:#161b22;border-radius:8px;color:#8b949e;">🤖 ' + t('compare.analyzing') + '</div>';
        try {
            var resp = await fetch('/api/ai/compare', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ patent_id1: id1, patent_id2: id2 })
            });
            var data = await resp.json();
            el.innerHTML = '<div style="padding:20px;background:#161b22;border-radius:8px;"><h3 style="margin:0 0 16px 0;color:#58a6ff;">📊 ' + t('compare.result') + '</h3><div style="color:#c9d1d9;line-height:1.8;white-space:pre-wrap;">' + escapeHtml(data.content).replace(/\n/g, '<br>') + '</div></div>';
        } catch(e) {
            el.innerHTML = '<div style="padding:20px;background:#161b22;border-radius:8px;color:#f85149;">' + t('compare.fail') + ': ' + escapeHtml(String(e)) + '</div>';
        }
    }
    renderNavbar('compare');
    applyI18nCommon();
    </script>
</body>
</html>
