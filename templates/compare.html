<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专利对比分析 - Patent Hub</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Patent Hub</a>
        <div class="nav-links">
            <a href="/search" data-i18n="nav.search"></a>
            <a href="/idea" data-i18n="nav.idea"></a>
            <a href="/compare" class="active" data-i18n="nav.compare"></a>
            <a href="/ai" data-i18n="nav.ai"></a>
            <a href="/settings?from=/compare" data-i18n="nav.settings"></a>
        </div>
    </nav>
    <main class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 data-i18n="compare.title"></h2>
            <select onchange="setI18nLang(this.value)" id="lang-switch" style="padding:4px 8px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;">
                <option value="zh">中文</option>
                <option value="en">English</option>
            </select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
            <div>
                <label style="display:block;margin-bottom:8px;color:#8b949e;" data-i18n="compare.patent1"></label>
                <input type="text" id="patent1" data-i18n-placeholder="compare.placeholder1" style="width:100%;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;">
            </div>
            <div>
                <label style="display:block;margin-bottom:8px;color:#8b949e;" data-i18n="compare.patent2"></label>
                <input type="text" id="patent2" data-i18n-placeholder="compare.placeholder2" style="width:100%;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;">
            </div>
        </div>
        <button onclick="comparePatents()" style="width:100%;padding:12px;background:#58a6ff;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:16px;" data-i18n="compare.btn"></button>
        <div id="result" style="margin-top:20px;"></div>
    </main>
    <script src="/static/i18n.js"></script>
    <script>
    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    async function comparePatents() {
        var id1 = document.getElementById('patent1').value.trim();
        var id2 = document.getElementById('patent2').value.trim();
        if (!id1 || !id2) {
            alert(t('compare.alert'));
            return;
        }
        var el = document.getElementById('result');
        el.innerHTML = '<div style="padding:20px;background:#161b22;border-radius:8px;color:#8b949e;">🤖 ' + t('compare.analyzing') + '</div>';
        try {
            var resp = await fetch('/api/ai/compare', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ patent_id1: id1, patent_id2: id2 })
            });
            var data = await resp.json();
            el.innerHTML = '<div style="padding:20px;background:#161b22;border-radius:8px;"><h3 style="margin:0 0 16px 0;color:#58a6ff;">📊 ' + t('compare.result') + '</h3><div style="color:#c9d1d9;line-height:1.8;white-space:pre-wrap;">' + escapeHtml(data.content).replace(/\n/g, '<br>') + '</div></div>';
        } catch(e) {
            el.innerHTML = '<div style="padding:20px;background:#161b22;border-radius:8px;color:#f85149;">' + t('compare.fail') + ': ' + escapeHtml(String(e)) + '</div>';
        }
    }
    document.getElementById('lang-switch').value = i18nLang;
    applyI18nCommon();
    </script>
</body>
</html>
