<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - 创研台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <main class="container page-main">
        <div class="patent-detail">
            <div class="detail-header">
                <h1>{{title}}</h1>
                <span class="patent-number-large">{{patent_number}}</span>
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <button class="ai-btn" onclick="aiSummarize()">🤖 <span data-i18n="detail.analyze"></span></button>
                    <button class="ai-btn" id="load-full-btn" onclick="loadFullText()" style="background:#1f6feb;">📄 加载全文</button>
                    <button class="ai-btn" onclick="window.open('/api/patent/pdf/{{id}}','_blank')" style="background:#8b5cf6;">📥 导出 PDF</button>
                    <button class="ai-btn" id="collect-btn" onclick="toggleCollect()" style="background:#d29922;">⭐ 收藏</button>
                </div>
            </div>
            <div id="ai-summary" class="ai-summary" style="display:none"></div>

            <!-- 收藏夹 & 标签 -->
            <div id="collect-tags-area" style="margin:12px 0;display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
                <span id="collections-display" style="color:#8b949e;font-size:0.9em;"></span>
                <span style="color:#30363d;">|</span>
                <span id="tags-display" style="font-size:0.9em;"></span>
                <input type="text" id="new-tag-input" placeholder="添加标签..." style="background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:4px 8px;border-radius:4px;width:120px;font-size:0.85em;" onkeydown="if(event.key==='Enter')addTag()">
            </div>

            <div class="detail-grid">
                <div class="detail-section">
                    <h3 data-i18n="common.info.basicInfo"></h3>
                    <table class="info-table">
                        <tr><td data-i18n="common.info.patent"></td><td>{{patent_number}}</td></tr>
                        <tr><td data-i18n="common.info.applicant"></td><td>{{applicant}}</td></tr>
                        <tr><td data-i18n="common.info.inventor"></td><td>{{inventor}}</td></tr>
                        <tr><td data-i18n="common.info.filingDate"></td><td>{{filing_date}}</td></tr>
                        <tr><td data-i18n="common.info.pubDate"></td><td>{{publication_date}}</td></tr>
                        <tr><td data-i18n="common.info.grantDate"></td><td>{{grant_date}}</td></tr>
                        <tr><td data-i18n="common.info.country"></td><td>{{country}}</td></tr>
                        <tr><td data-i18n="common.info.legalStatus" id="legal-status-label"></td><td>{{legal_status}}</td></tr>
                    </table>
                </div>
                <div class="detail-section">
                    <h3 data-i18n="common.info.classification"></h3>
                    <p><strong>IPC:</strong> {{ipc_codes}}</p>
                    <p><strong>CPC:</strong> {{cpc_codes}}</p>
                </div>
            </div>

            <div class="detail-tabs">
                <button class="tab active" onclick="showTab('abstract')" data-i18n="detail.tabAbstract"></button>
                <button class="tab" onclick="showTab('claims')" data-i18n="detail.tabClaims"></button>
                <button class="tab" onclick="showTab('description')" data-i18n="detail.tabDesc"></button>
                <button class="tab" onclick="showTab('drawings')" id="tab-drawings-btn">📐 图纸</button>
                <button class="tab" onclick="showTab('ai-chat')" data-i18n="detail.tabAiChat"></button>
            </div>

            <div id="tab-abstract" class="tab-content active">
                <div class="content-box">{{abstract_text}}</div>
            </div>
            <div id="tab-claims" class="tab-content">
                <div style="margin-bottom:12px;">
                    <button onclick="analyzeClaims()" id="claims-analyze-btn" style="background:#1f6feb;padding:6px 16px;border-radius:6px;color:white;border:none;cursor:pointer;">🔍 分析权利要求</button>
                </div>
                <div id="claims-analysis-result" style="display:none;margin-bottom:16px;padding:16px;background:#161b22;border:1px solid #30363d;border-radius:8px;"></div>
                <div class="content-box"><pre>{{claims}}</pre></div>
            </div>
            <div id="tab-description" class="tab-content">
                <div class="content-box"><pre>{{description}}</pre></div>
            </div>
            <div id="tab-drawings" class="tab-content">
                <div id="drawings-container" style="text-align:center;">
                    <p style="color:#8b949e;">加载全文后可查看图纸</p>
                </div>
            </div>
            <div id="tab-ai-chat" class="tab-content">
                <div class="chat-box" id="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-msg" data-i18n-placeholder="detail.chatPlaceholder">
                    <button onclick="sendChat()" data-i18n="detail.send"></button>
                </div>
            </div>
        </div>

<div style="margin-top: 40px; padding: 20px; background: #161b22; border-radius: 8px;">
<h3 style="margin: 0 0 16px 0; color: #58a6ff;" data-i18n="detail.upload"></h3>
<p style="color: #8b949e; margin-bottom: 12px;" data-i18n="detail.uploadHint"></p>
<input type="file" id="upload-file" accept=".txt,.doc,.docx,.pdf,.png,.jpg,.jpeg,.gif,.bmp,.webp" style="margin-bottom: 12px;">
<button onclick="uploadCompare()" style="background: #238636;" data-i18n="detail.uploadBtn"></button>
<div id="upload-result" style="margin-top: 16px;"></div>
</div>

<div id="similar-patents" style="margin-top: 40px; padding: 20px; background: #161b22; border-radius: 8px;">
<h3 style="margin: 0 0 16px 0; color: #58a6ff;" data-i18n="detail.similar"></h3>
<div id="similar-list" data-i18n="detail.similarLoading"></div>
</div></main>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>
    <script src="/static/i18n.js"></script>
    <script>
    function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function applyDetailI18n() {
        // Re-apply legal status label lookup for enrich
        var legalLabel = document.getElementById('legal-status-label');
        if (legalLabel) legalLabel.textContent = t('common.info.legalStatus');
    }

    function showTab(name) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        var tabEl = document.getElementById('tab-' + name);
        if (tabEl) tabEl.classList.add('active');
        if (event && event.target) event.target.classList.add('active');
    }

    async function aiSummarize() {
        const el = document.getElementById('ai-summary');
        el.style.display = 'block';
        el.textContent = '🤖 ' + t('detail.analyzing');
        try {
            const resp = await fetch('/api/ai/summarize', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({patent_number: '{{id}}'})
            });
            if (!resp.ok) throw new Error('服务器错误 (' + resp.status + ')');
            const data = await resp.json();
            el.innerHTML = DOMPurify.sanitize('<h3>🤖 ' + t('detail.result') + '</h3><div>' + escapeHtml(data.content).replace(/\n/g, '<br>') + '</div>');
        } catch(e) { el.textContent = t('detail.fail') + ': ' + e; }
    }

    document.getElementById('chat-msg').addEventListener('keydown', e => {
        if (e.key === 'Enter') sendChat();
    });

    var patentChatHistory = [];

    async function sendChat() {
        const input = document.getElementById('chat-msg');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        const box = document.getElementById('chat-messages');
        var userMsgDiv = document.createElement('div');
        userMsgDiv.className = 'msg user';
        userMsgDiv.textContent = msg;
        box.appendChild(userMsgDiv);
        var aiLoadDiv = document.createElement('div');
        aiLoadDiv.className = 'msg ai';
        aiLoadDiv.id = 'ai-loading';
        aiLoadDiv.textContent = t('ai.thinking');
        box.appendChild(aiLoadDiv);
        box.scrollTop = box.scrollHeight;
        try {
            const resp = await fetch('/api/ai/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, patent_id: '{{id}}', history: patentChatHistory})
            });
            if (!resp.ok) throw new Error('服务器错误 (' + resp.status + ')');
            const data = await resp.json();
            if (data.error || !data.content) {
                var errMsg = data.error || 'AI 无响应';
                if (errMsg.includes('unexpected end of file') || errMsg.includes('connection')) {
                    errMsg += '\n\n💡 可能原因：API Key 无效或网络不稳定。请到「设置」页检查 AI 配置。';
                }
                var errEl = document.getElementById('ai-loading');
                var errReplace = document.createElement('div');
                errReplace.className = 'msg ai error';
                errReplace.style.color = '#f85149';
                errReplace.innerHTML = DOMPurify.sanitize(escapeHtml(errMsg).replace(/\n/g, '<br>'));
                errEl.parentNode.replaceChild(errReplace, errEl);
            } else {
                var loadEl = document.getElementById('ai-loading');
                var aiReplace = document.createElement('div');
                aiReplace.className = 'msg ai';
                aiReplace.innerHTML = DOMPurify.sanitize(escapeHtml(data.content).replace(/\n/g, '<br>'));
                loadEl.parentNode.replaceChild(aiReplace, loadEl);
                patentChatHistory.push(["user", msg]);
                patentChatHistory.push(["assistant", data.content]);
            }
        } catch(e) {
            var errText = String(e);
            if (errText.includes('unexpected end of file') || errText.includes('connection')) {
                errText += '\n\n💡 请到「设置」页检查 AI API Key 是否正确配置。';
            }
            var catchEl = document.getElementById('ai-loading');
            var catchReplace = document.createElement('div');
            catchReplace.className = 'msg ai error';
            catchReplace.style.color = '#f85149';
            catchReplace.innerHTML = DOMPurify.sanitize(escapeHtml(errText).replace(/\n/g, '<br>'));
            catchEl.parentNode.replaceChild(catchReplace, catchEl);
        }
        box.scrollTop = box.scrollHeight;
    }

    // Update page content from enriched patent data
    function applyEnrichedData(p) {
        var claimsEl = document.querySelector('#tab-claims .content-box pre');
        var descEl = document.querySelector('#tab-description .content-box pre');
        var absEl = document.querySelector('#tab-abstract .content-box');
        if (claimsEl && p.claims) claimsEl.textContent = p.claims;
        if (descEl && p.description) descEl.textContent = p.description;
        if (absEl && p.abstract_text) absEl.textContent = p.abstract_text;
        document.querySelectorAll('.detail-section p').forEach(function(el) {
            // Only update if we have real classification codes (not boolean/empty)
            if (el.innerHTML.indexOf('IPC:') >= 0 && p.ipc_codes && typeof p.ipc_codes === 'string' && p.ipc_codes.length > 2 && p.ipc_codes !== 'true') {
                el.innerHTML = DOMPurify.sanitize('<strong>IPC:</strong> ' + escapeHtml(p.ipc_codes));
            }
            if (el.innerHTML.indexOf('CPC:') >= 0 && p.cpc_codes && typeof p.cpc_codes === 'string' && p.cpc_codes.length > 2 && p.cpc_codes !== 'true') {
                el.innerHTML = DOMPurify.sanitize('<strong>CPC:</strong> ' + escapeHtml(p.cpc_codes));
            }
        });
        if (p.legal_status) {
            var lbl = document.getElementById('legal-status-label');
            if (lbl) {
                var cell = lbl.closest('tr');
                if (cell) { var td = cell.querySelectorAll('td')[1]; if (td) td.textContent = p.legal_status; }
            }
        }
        // Render patent drawings
        renderImages(p.images, p.pdf_url);
    }

    function renderImages(imagesJson, pdfUrl) {
        var container = document.getElementById('drawings-container');
        var images = [];
        try {
            if (typeof imagesJson === 'string' && imagesJson.length > 2) {
                images = JSON.parse(imagesJson);
            } else if (Array.isArray(imagesJson)) {
                images = imagesJson;
            }
        } catch(e) {}

        if (images.length === 0) {
            container.innerHTML = '';
            var noDrawP = document.createElement('p');
            noDrawP.style.color = '#8b949e';
            noDrawP.textContent = '暂无图纸。点击「加载全文」获取。';
            container.appendChild(noDrawP);
            return;
        }

        var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
        html += '<span style="color:#58a6ff;font-weight:bold;">共 ' + images.length + ' 张图纸</span>';
        if (pdfUrl) {
            var pdfProxyUrl = '/api/patent/image-proxy?url=' + encodeURIComponent(pdfUrl);
            html += '<a href="' + pdfProxyUrl + '" target="_blank" style="color:#58a6ff;text-decoration:none;">📄 下载原始 PDF</a>';
        }
        html += '</div>';

        html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">';
        images.forEach(function(url, idx) {
            // Use local proxy to bypass GFW blocking of Google patent images
            var proxyUrl = '/api/patent/image-proxy?url=' + encodeURIComponent(url);
            html += '<div style="background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:8px;text-align:center;">';
            html += '<a href="' + proxyUrl + '" target="_blank">';
            html += '<img src="' + proxyUrl + '" alt="图 ' + (idx + 1) + '" style="max-width:100%;max-height:400px;border-radius:4px;" loading="lazy" onerror="this.parentElement.parentElement.style.display=\'none\'">';
            html += '</a>';
            html += '<div style="color:#8b949e;font-size:0.8em;margin-top:4px;">图 ' + (idx + 1) + '</div>';
            html += '</div>';
        });
        html += '</div>';
        container.innerHTML = DOMPurify.sanitize(html);

        // Update tab button badge
        var tabBtn = document.getElementById('tab-drawings-btn');
        if (tabBtn) tabBtn.textContent = '📐 图纸 (' + images.length + ')';
    }

    // Load full text + images (manual button)
    async function loadFullText() {
        var btn = document.getElementById('load-full-btn');
        btn.textContent = '⏳ 加载中...';
        btn.disabled = true;
        var hasImages = false;
        try {
            // Try free endpoint first (no API key needed)
            var resp = await fetch('/api/patent/enrich-free/{{id}}');
            var data = await resp.json();
            if (data.status === 'ok' && data.patent) {
                applyEnrichedData(data.patent);
                // Check if we got images
                var imgs = [];
                try { imgs = JSON.parse(data.patent.images || '[]'); } catch(e) {}
                hasImages = imgs.length > 0;
            }

            // Always try SerpAPI to get images + richer data (even if free succeeded for text)
            if (!hasImages) {
                btn.textContent = '⏳ 加载图纸...';
                resp = await fetch('/api/patent/enrich/{{id}}');
                data = await resp.json();
                if (data.status === 'ok' && data.patent) {
                    applyEnrichedData(data.patent);
                    try { var i2 = JSON.parse(data.patent.images || '[]'); hasImages = i2.length > 0; } catch(e) {}
                }
            }

            if (hasImages) {
                btn.textContent = '✅ 已加载';
                btn.style.background = '#238636';
            } else {
                // Still loaded text even without images
                var descEl = document.querySelector('#tab-description .content-box pre');
                if (descEl && descEl.textContent.trim().length > 10) {
                    btn.textContent = '✅ 文本已加载';
                    btn.style.background = '#238636';
                } else {
                    btn.textContent = '⚠️ 部分加载';
                    btn.style.background = '#d29922';
                }
            }
        } catch(e) {
            btn.textContent = '❌ 加载失败';
            btn.style.background = '#da3633';
        }
        setTimeout(function() {
            btn.disabled = false;
        }, 3000);
    }

    // Auto-enrich on page load
    (async function() {
        var claimsEl = document.querySelector('#tab-claims .content-box pre');
        var descEl = document.querySelector('#tab-description .content-box pre');
        var needsEnrich = (!claimsEl || claimsEl.textContent.trim().length < 5)
                       || (!descEl || descEl.textContent.trim().length < 5);
        if (needsEnrich) {
            var enrichInfo = document.createElement('div');
            enrichInfo.className = 'ai-summary';
            enrichInfo.style.display = 'block';
            enrichInfo.textContent = '正在加载专利全文和图纸...';
            var detailEl = document.querySelector('.patent-detail');
            var tabsEl = document.querySelector('.detail-tabs');
            if (detailEl && tabsEl) detailEl.insertBefore(enrichInfo, tabsEl);
            try {
                // Always use SerpAPI for full data (text + images + IPC)
                var resp = await fetch('/api/patent/enrich/{{id}}');
                var data = await resp.json();
                if (data.status === 'ok' && data.patent) {
                    applyEnrichedData(data.patent);
                    enrichInfo.textContent = '✅ 全文和图纸加载完成';
                    document.getElementById('load-full-btn').textContent = '✅ 已加载';
                    document.getElementById('load-full-btn').style.background = '#238636';
                    setTimeout(function() { enrichInfo.style.display = 'none'; }, 3000);
                } else {
                    // Try free endpoint as fallback (text only)
                    resp = await fetch('/api/patent/enrich-free/{{id}}');
                    data = await resp.json();
                    if (data.status === 'ok' && data.patent) {
                        applyEnrichedData(data.patent);
                        enrichInfo.textContent = '✅ 文本已加载（图纸需要 SerpAPI）';
                    } else {
                        enrichInfo.textContent = '点击「加载全文」按钮手动加载';
                    }
                    setTimeout(function() { enrichInfo.style.display = 'none'; }, 5000);
                }
            } catch(e) {
                enrichInfo.textContent = '自动加载失败，请点击「加载全文」按钮';
                setTimeout(function() { enrichInfo.style.display = 'none'; }, 5000);
            }
        } else {
            // Already have full text
            document.getElementById('load-full-btn').textContent = '✅ 已加载';
            document.getElementById('load-full-btn').style.background = '#238636';
        }
    })();

    async function loadSimilar() {
        const patentId = window.location.pathname.split('/').pop();
        try {
            const res = await fetch('/api/patent/similar/' + patentId);
            if (!res.ok) throw new Error('服务器错误 (' + res.status + ')');
            const data = await res.json();
            if (data.similar && data.similar.length > 0) {
                let html = '';
                data.similar.forEach(p => {
                    html += '<div style="padding: 12px; background: #0d1117; border-radius: 6px; margin-bottom: 12px;">'
                        + '<h4 style="margin: 0 0 8px 0;"><a href="/patent/' + encodeURIComponent(p.id) + '" style="color: #58a6ff;">' + escapeHtml(p.title || '无标题') + '</a></h4>'
                        + '<div style="color: #8b949e; font-size: 13px;">'
                        + '<span>' + escapeHtml(p.patent_number || '暂无') + '</span> | '
                        + '<span>' + escapeHtml(p.applicant || '暂无') + '</span>'
                        + '</div></div>';
                });
                document.getElementById('similar-list').innerHTML = DOMPurify.sanitize(html);
            } else {
                document.getElementById('similar-list').textContent = t('detail.similarNone');
            }
        } catch (err) {
            document.getElementById('similar-list').textContent = t('detail.similarFail');
        }
    }

    async function uploadCompare() {
        const fileInput = document.getElementById('upload-file');
        const file = fileInput.files[0];
        if (!file) { alert(t('detail.selectFile')); return; }
        const patentId = window.location.pathname.split('/').pop();
        const formData = new FormData();
        formData.append('file', file);
        formData.append('patent_id', patentId);
        var uploadResultEl = document.getElementById('upload-result');
        uploadResultEl.innerHTML = '';
        var analyzingP = document.createElement('p');
        analyzingP.style.color = '#58a6ff';
        analyzingP.textContent = t('detail.uploadAnalyzing');
        uploadResultEl.appendChild(analyzingP);
        try {
            const res = await fetch('/api/upload/compare', { method: 'POST', body: formData });
            if (!res.ok) throw new Error('服务器错误 (' + res.status + ')');
            const data = await res.json();
            if (data.success) {
                var resultDiv = document.createElement('div');
                resultDiv.style.cssText = 'padding: 16px; background: #0d1117; border-radius: 6px; white-space: pre-wrap; line-height: 1.6;';
                resultDiv.textContent = data.analysis;
                document.getElementById('upload-result').innerHTML = '';
                document.getElementById('upload-result').appendChild(resultDiv);
            } else {
                var errP2 = document.createElement('p');
                errP2.style.color = '#f85149';
                errP2.textContent = data.error;
                document.getElementById('upload-result').innerHTML = '';
                document.getElementById('upload-result').appendChild(errP2);
            }
        } catch (err) {
            var errP3 = document.createElement('p');
            errP3.style.color = '#f85149';
            errP3.textContent = err.message;
            document.getElementById('upload-result').innerHTML = '';
            document.getElementById('upload-result').appendChild(errP3);
        }
    }

    // Claims analysis (generated by aion-forge, refined)
    async function analyzeClaims() {
        var btn = document.getElementById('claims-analyze-btn');
        var result = document.getElementById('claims-analysis-result');
        btn.textContent = '⏳ 分析中...';
        btn.disabled = true;
        result.style.display = 'block';
        result.textContent = '正在分析权利要求...';
        try {
            var resp = await fetch('/api/ai/claims', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({patent_id: '{{id}}'})
            });
            if (!resp.ok) throw new Error('服务器错误 (' + resp.status + ')');
            var data = await resp.json();
            if (data.status === 'ok') {
                result.innerHTML = DOMPurify.sanitize('<h3 style="color:#58a6ff;margin:0 0 12px;">🔍 权利要求分析</h3><div style="color:#c9d1d9;line-height:1.8;white-space:pre-wrap;">' + escapeHtml(data.analysis).replace(/\n/g, '<br>') + '</div>');
            } else {
                var claimErrSpan = document.createElement('span');
                claimErrSpan.style.color = '#f85149';
                claimErrSpan.textContent = '❌ ' + (data.error || data.message || '分析失败');
                result.innerHTML = '';
                result.appendChild(claimErrSpan);
            }
        } catch(e) {
            var claimCatchSpan = document.createElement('span');
            claimCatchSpan.style.color = '#f85149';
            claimCatchSpan.textContent = '❌ 请求失败: ' + e.message;
            result.innerHTML = '';
            result.appendChild(claimCatchSpan);
        }
        btn.textContent = '🔍 分析权利要求';
        btn.disabled = false;
    }

    // Init
    renderNavbar('detail');
    renderSidebar(
      '<div class="sidebar-section">'
      + '<div class="sidebar-label">' + (i18nLang === 'zh' ? '操作' : 'Actions') + '</div>'
      + '<button class="sidebar-btn primary" onclick="aiSummarize()">🤖 ' + t('detail.analyze') + '</button>'
      + '<button class="sidebar-btn" id="sb-load-full" onclick="loadFullText()">📄 加载全文</button>'
      + '<button class="sidebar-btn" onclick="window.open(\'/api/patent/pdf/{{id}}\',\'_blank\')">📥 导出 PDF</button>'
      + '<button class="sidebar-btn" id="sb-collect" onclick="toggleCollect()">⭐ 收藏</button>'
      + '</div>'
    );
    applyI18nCommon();
    window._onI18nLangChange = window._onI18nLangChange || [];
    window._onI18nLangChange.push(applyDetailI18n);
    loadSimilar();
    // Render initial images from server data
    try {
        var initialImages = {{images_json}};
        var initialPdfUrl = '{{pdf_url}}';
        renderImages(initialImages, initialPdfUrl);
    } catch(e) {}

    // ── 收藏 & 标签功能 ────────────────────────────
    var patentId = '{{id}}';
    var isCollected = false;
    var defaultCollectionId = '';

    async function loadCollectState() {
        try {
            var res = await fetch('/api/patents/' + patentId + '/collections');
            var data = await res.json();
            var cols = (data.collection_ids || data.collections || []).filter(function(c) { return c; });
            isCollected = cols.length > 0;
            if (isCollected) defaultCollectionId = cols[0];
            var btn = document.getElementById('collect-btn');
            btn.textContent = isCollected ? '⭐ 已收藏' : '⭐ 收藏';
            btn.style.background = isCollected ? '#238636' : '#d29922';
            document.getElementById('collections-display').textContent = isCollected ? '已加入 ' + cols.length + ' 个收藏夹' : '';
        } catch(e) {}
    }

    async function toggleCollect() {
        if (isCollected && defaultCollectionId) {
            await fetch('/api/collections/' + defaultCollectionId + '/remove/' + patentId, {method:'DELETE'});
        } else {
            // Ensure default collection exists
            var listRes = await fetch('/api/collections');
            var listData = await listRes.json();
            var cols = listData.collections || [];
            var colId;
            if (cols.length > 0) {
                colId = cols[0].id;
            } else {
                var createRes = await fetch('/api/collections', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({name:'我的收藏', description:'默认收藏夹'})
                });
                var createData = await createRes.json();
                colId = createData.id;
            }
            await fetch('/api/collections/' + colId + '/add', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({patent_id: patentId})
            });
        }
        loadCollectState();
    }

    async function loadTags() {
        try {
            var res = await fetch('/api/patents/' + patentId + '/tags');
            var data = await res.json();
            var tags = data.tags || [];
            var tagsContainer = document.getElementById('tags-display');
            tagsContainer.innerHTML = '';
            tags.forEach(function(tagName) {
                var tagSpan = document.createElement('span');
                tagSpan.style.cssText = 'background:#1f6feb;color:white;padding:2px 8px;border-radius:10px;font-size:0.8em;cursor:pointer;';
                tagSpan.textContent = tagName + ' ✕';
                tagSpan.setAttribute('onclick', "removeTag('" + tagName.replace(/'/g, "\\'") + "')");
                tagsContainer.appendChild(tagSpan);
                tagsContainer.appendChild(document.createTextNode(' '));
            });
        } catch(e) {}
    }

    async function addTag() {
        var input = document.getElementById('new-tag-input');
        var tag = input.value.trim();
        if (!tag) return;
        await fetch('/api/patents/' + patentId + '/tags', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({tag: tag})
        });
        input.value = '';
        loadTags();
    }

    async function removeTag(tag) {
        await fetch('/api/patents/' + patentId + '/tags/' + encodeURIComponent(tag), {method:'DELETE'});
        loadTags();
    }

    loadCollectState();
    loadTags();
    </script>
</body>
</html>
