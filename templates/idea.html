<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创新推演 - 创研台</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <style>
        .idea-layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; height: 100vh; }
        .idea-sidebar { background: #161b22; border-right: 1px solid #30363d; padding: 20px; overflow-y: auto; height: 100vh; position: sticky; top: 0; }
        .idea-main { padding: 24px; max-width: 900px; overflow-y: auto; }
        .idea-form textarea { width: 100%; min-height: 150px; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #f0f6fc; font-size: 0.95em; resize: vertical; font-family: inherit; line-height: 1.6; }
        .idea-form input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #f0f6fc; font-size: 1em; margin-bottom: 12px; }
        .idea-form label { display: block; color: #8b949e; margin-bottom: 6px; font-size: 0.9em; }
        .form-group { margin-bottom: 16px; }
        .btn-row { display: flex; gap: 12px; margin-top: 16px; }
        .btn-primary { background: #1f6feb; }
        .btn-primary:hover { background: #388bfd; }
        .btn-primary:disabled { background: #30363d; cursor: not-allowed; opacity: 0.6; }
        .history-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 6px; border: 1px solid transparent; }
        .history-item:hover { background: #21262d; }
        .history-item.active { border-color: #1f6feb; background: #21262d; }
        .history-title { font-size: 0.9em; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-meta { font-size: 0.75em; color: #8b949e; margin-top: 4px; display: flex; justify-content: space-between; }
        .score-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; font-weight: 600; }
        .score-high { background: #238636; color: #fff; }
        .score-mid { background: #9e6a03; color: #fff; }
        .score-low { background: #da3633; color: #fff; }
        .analysis-result { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-top: 20px; line-height: 1.7; }
        .analysis-result h3 { color: #58a6ff; margin: 16px 0 8px; }
        .analysis-result h3:first-child { margin-top: 0; }
        .analysis-result ul { margin-left: 20px; margin-bottom: 8px; }
        .analysis-result li { margin-bottom: 4px; }
        .analysis-result strong { color: #f0f6fc; }
        .analysis-result p { margin-bottom: 8px; }
        .status-bar { padding: 12px 16px; border-radius: 8px; margin-top: 16px; }
        .status-analyzing { background: #1f6feb22; border: 1px solid #1f6feb; color: #58a6ff; }
        .status-done { background: #23863622; border: 1px solid #238636; color: #3fb950; }
        .status-error { background: #da363322; border: 1px solid #da3633; color: #f85149; }
        .findings-section { margin-top: 20px; }
        .findings-section h3 { margin-bottom: 12px; color: #58a6ff; }
        .finding-card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
        .finding-card .title { font-weight: 500; margin-bottom: 4px; }
        .finding-card .snippet { color: #8b949e; font-size: 0.85em; line-height: 1.5; }
        .finding-card a { font-size: 0.8em; }
        .finding-card .source-tag { display: inline-block; font-size: 0.7em; padding: 1px 6px; border-radius: 3px; background: #21262d; color: #8b949e; margin-left: 8px; }
        .score-display { text-align: center; padding: 20px; margin: 16px 0; }
        .score-number { font-size: 3em; font-weight: 700; }
        .score-label { color: #8b949e; margin-top: 4px; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-steps { margin-top: 8px; font-size: 0.85em; color: #8b949e; }
        .progress-steps .step { margin: 4px 0; padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
        .progress-steps .step.active { color: #58a6ff; background: #1f6feb11; }
        .progress-steps .step.done { color: #3fb950; }
        .progress-steps .step.skipped { color: #9e6a03; text-decoration: line-through; }
        .progress-steps .step.error { color: #f85149; }
        .progress-steps .step-icon { width: 18px; text-align: center; }
        .pipeline-progress { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-top: 16px; }
        .pipeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .pipeline-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
        .pipeline-bar-fill { height: 100%; background: #1f6feb; border-radius: 3px; transition: width 0.3s ease; }
        @media (max-width: 768px) {
            .idea-layout { grid-template-columns: 1fr; }
            .idea-sidebar { border-right: none; border-bottom: 1px solid #30363d; max-height: 200px; }
        }
    </style>
</head>
<body>
    <nav id="global-nav"></nav>
    <div class="page-with-sidebar">
    <div class="idea-layout page-main">
        <div class="idea-sidebar">
            <h3 data-i18n="idea.history" style="margin-bottom:12px;"></h3>
            <div id="history-list"><p class="hint" style="font-size:0.85em;" data-i18n="idea.historyEmpty"></p></div>
        </div>

        <div class="idea-main">
            <h2 style="margin-bottom: 6px;" data-i18n="idea.title"></h2>
            <p class="hint" data-i18n="idea.hint"></p>

            <div class="idea-form" id="idea-form">
                <div class="form-group">
                    <label data-i18n="idea.titleLabel"></label>
                    <input type="text" id="idea-title" data-i18n-placeholder="idea.titlePlaceholder" autofocus>
                </div>
                <div class="form-group">
                    <label data-i18n="idea.descLabel"></label>
                    <textarea id="idea-desc" data-i18n-placeholder="idea.descPlaceholder"></textarea>
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:12px;">
                    <label style="margin:0;white-space:nowrap;">推演模式:</label>
                    <div style="display:flex;border:1px solid #30363d;border-radius:6px;overflow:hidden;">
                        <button type="button" id="mode-quick" onclick="setAnalysisMode('quick')"
                            style="padding:6px 14px;font-size:0.85em;border:none;cursor:pointer;background:#21262d;color:#8b949e;">
                            快速推演
                        </button>
                        <button type="button" id="mode-deep" onclick="setAnalysisMode('deep')"
                            style="padding:6px 14px;font-size:0.85em;border:none;cursor:pointer;background:#1f6feb;color:#fff;">
                            深度推演
                        </button>
                    </div>
                    <span id="mode-hint" style="font-size:0.8em;color:#8b949e;">13 步流水线 + 多角度 AI 分析</span>
                </div>
                <div class="btn-row">
                    <button class="btn-primary" id="submit-btn" onclick="submitIdea()" data-i18n="idea.submit"></button>
                    <button onclick="clearForm()" style="background:#21262d;" data-i18n="idea.clear"></button>
                </div>
            </div>

            <div id="status-area"></div>
            <div id="score-area"></div>
            <div id="analysis-area"></div>
            <div id="findings-area"></div>

            <!-- Evidence chain panel -->
            <div id="evidence-panel" style="display:none; margin-top:16px; padding:16px; background:#161b22; border-radius:8px; border:1px solid #30363d;">
                <details>
                    <summary style="cursor:pointer; color:#58a6ff; font-weight:bold; font-size:1.05em;">
                        🔗 证据链 / Evidence Chain (<span id="evidence-count">0</span> 条)
                    </summary>
                    <div id="evidence-list" style="margin-top:12px;"></div>
                </details>
            </div>

            <!-- Multi-round discussion panel -->
            <div id="discussion-panel" style="display:none; margin-top:24px; padding:20px; background:#161b22; border-radius:8px; border:1px solid #30363d;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h3 style="margin:0; color:#58a6ff;" id="disc-title" data-i18n="idea.discussTitle"></h3>
                    <button onclick="summarizeDiscussion()" style="background:#238636; padding:4px 12px; font-size:0.85em;" id="summary-btn" data-i18n="idea.generateSummary"></button>
                </div>
                <div id="discussion-summary" style="display:none; margin-bottom:12px; padding:12px; background:#0d1117; border-radius:6px; border-left:3px solid #58a6ff;">
                </div>
                <div id="chat-messages" style="max-height:400px; overflow-y:auto; margin-bottom:12px;">
                </div>
                <div id="chat-attachments" style="display:none; margin-bottom:6px; font-size:0.85em;"></div>
                <div style="display:flex; gap:8px; align-items:flex-end;">
                    <div style="flex:1; position:relative;">
                        <textarea id="chat-input" data-i18n-placeholder="idea.chatPlaceholder" rows="3" style="width:100%; padding:8px 12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; resize:vertical; min-height:60px; max-height:300px; font-size:0.95em; font-family:inherit;" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage();}"></textarea>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <label style="background:#21262d; padding:8px 10px; border-radius:6px; cursor:pointer; text-align:center; border:1px solid #30363d; font-size:0.85em; color:#8b949e;" title="上传图片或文件">
                            📎
                            <input type="file" id="chat-file-input" multiple accept=".pdf,.docx,.doc,.txt,.png,.jpg,.jpeg,.gif,.webp" style="display:none;" onchange="handleChatFileSelect(this)">
                        </label>
                        <button onclick="sendChatMessage()" style="background:#238636; padding:8px 16px; white-space:nowrap; border-radius:6px;" data-i18n="idea.send"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <aside id="page-sidebar" class="page-sidebar"></aside>
    </div>

    <script src="/static/i18n.js"></script>
    <script>
    renderNavbar('idea');
    renderSidebar();
    applyI18nCommon();
    // Hook reapplyPage into navbar language switch
    if (typeof window._onI18nLangChange === 'undefined') window._onI18nLangChange = [];
    window._onI18nLangChange.push(function() { if (typeof reapplyPage === 'function') reapplyPage(); });
    </script>
    <script>
    let currentIdeaId = null;
    let isAnalyzing = false;
    let analysisMode = 'deep'; // 'quick' or 'deep'

    function setAnalysisMode(mode) {
        analysisMode = mode;
        var quickBtn = document.getElementById('mode-quick');
        var deepBtn = document.getElementById('mode-deep');
        var hint = document.getElementById('mode-hint');
        if (mode === 'quick') {
            quickBtn.style.background = '#1f6feb';
            quickBtn.style.color = '#fff';
            deepBtn.style.background = '#21262d';
            deepBtn.style.color = '#8b949e';
            hint.textContent = i18nLang === 'en' ? '6-step fast reasoning' : '6 步快速推演，同步返回';
        } else {
            deepBtn.style.background = '#1f6feb';
            deepBtn.style.color = '#fff';
            quickBtn.style.background = '#21262d';
            quickBtn.style.color = '#8b949e';
            hint.textContent = i18nLang === 'en' ? '13-step pipeline + multi-angle AI analysis' : '13 步流水线 + 多角度 AI 分析';
        }
    }

    function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function toggleDimension(id) {
        var el = document.getElementById(id);
        var arrow = document.getElementById(id + '-arrow');
        if (!el) return;
        if (el.style.display === 'none') {
            el.style.display = 'block';
            if (arrow) arrow.style.transform = 'rotate(90deg)';
        } else {
            el.style.display = 'none';
            if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
    }

    function reapplyPage() {
        applyI18nCommon();
        loadHistory();
    }

    // 13-step pipeline definitions
    const PIPELINE_STEPS = [
        { key: 'parse_input', zh: '解析输入，提取关键词', en: 'Parse input & extract keywords', type: 'code' },
        { key: 'expand_query', zh: 'AI 扩展搜索词', en: 'AI query expansion', type: 'llm' },
        { key: 'search_web', zh: '网络搜索', en: 'Web search', type: 'code' },
        { key: 'search_patents', zh: '专利搜索', en: 'Patent search', type: 'code' },
        { key: 'diversity_gate', zh: '多样性检查', en: 'Diversity gate', type: 'code' },
        { key: 'compute_similarity', zh: '相似度计算', en: 'Compute similarity', type: 'code' },
        { key: 'rank_and_filter', zh: '排序过滤', en: 'Rank & filter', type: 'code' },
        { key: 'detect_contradictions', zh: '矛盾信号检测', en: 'Detect contradictions', type: 'code' },
        { key: 'score_novelty', zh: '新颖性评分', en: 'Score novelty', type: 'code' },
        { key: 'ai_deep_analysis', zh: 'AI 深度分析', en: 'AI deep analysis', type: 'llm' },
        { key: 'ai_action_plan', zh: 'AI 行动方案', en: 'AI action plan', type: 'llm' },
        { key: 'finalize', zh: '生成报告', en: 'Generate report', type: 'code' },
    ];

    function buildPipelineUI() {
        let stepsHtml = PIPELINE_STEPS.map(function(s, i) {
            var label = i18nLang === 'en' ? s.en : s.zh;
            var typeTag = s.type === 'llm' ? ' <span style="font-size:0.75em;color:#d2a8ff;">[LLM]</span>' : '';
            return '<div class="step" id="pipeline-step-' + i + '" data-key="' + s.key + '">' +
                '<span class="step-icon">⏳</span>' +
                '<span>' + (i+1) + '. ' + label + typeTag + '</span></div>';
        }).join('');

        return '<div class="pipeline-progress">' +
            '<div class="pipeline-header">' +
            '<span style="font-weight:600;color:#f0f6fc;">' + (i18nLang === 'en' ? 'Innovation Validation Pipeline' : '创新验证流水线') + '</span>' +
            '<span id="pipeline-percent" style="color:#58a6ff;font-size:0.9em;">0%</span></div>' +
            '<div class="pipeline-bar"><div class="pipeline-bar-fill" id="pipeline-bar-fill" style="width:0%"></div></div>' +
            '<div class="progress-steps" id="pipeline-steps">' + stepsHtml + '</div></div>';
    }

    function updatePipelineStep(stepIndex, status, subStep, subProgress, message) {
        var el = document.getElementById('pipeline-step-' + stepIndex);
        if (!el) return;
        el.className = 'step ' + status;
        var icon = '⏳';
        if (status === 'running') icon = '<span class="spinner" style="width:14px;height:14px;border-width:2px;"></span>';
        else if (status === 'done') icon = '✅';
        else if (status === 'skipped') icon = '⏭️';
        else if (status === 'error') icon = '❌';
        el.querySelector('.step-icon').innerHTML = DOMPurify.sanitize(icon);

        // 多维推演子进度显示
        var subEl = document.getElementById('deep-reasoning-sub');
        if (subStep && stepIndex === 10) {
            // Step 11 = index 10 = AiDeepAnalysis
            var dimLabels = {
                'scientific': '🔬 科学推导', 'dialectical': '⚡ 辩证批判',
                'epistemological': '🔍 知识审计', 'phenomenological': '🌊 本质还原',
                'eastern': '☯️ 减法思维', 'topological': '🔗 跨域映射',
                'synthesis': '🔮 跨维度合成'
            };
            var label = dimLabels[subStep] || subStep;
            if (!subEl) {
                subEl = document.createElement('div');
                subEl.id = 'deep-reasoning-sub';
                subEl.style.cssText = 'margin-top:8px;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;font-size:0.85em;';
                el.appendChild(subEl);
            }
            var pctVal = subProgress ? Math.round(subProgress * 100) : 0;
            subEl.innerHTML = DOMPurify.sanitize(
                '<div style="display:flex;justify-content:space-between;align-items:center;">' +
                '<span style="color:#d2a8ff;">' + label + '</span>' +
                '<span style="color:#8b949e;">' + pctVal + '%</span></div>' +
                '<div style="height:3px;background:#21262d;border-radius:2px;margin-top:4px;">' +
                '<div style="height:100%;width:' + pctVal + '%;background:#d2a8ff;border-radius:2px;transition:width 0.3s;"></div></div>'
            );
        } else if (subEl && status === 'done') {
            subEl.remove();
        }

        // Update progress bar
        var doneCount = document.querySelectorAll('#pipeline-steps .step.done, #pipeline-steps .step.skipped').length;
        var pct = Math.round((doneCount / 12) * 100);
        var fill = document.getElementById('pipeline-bar-fill');
        var pctEl = document.getElementById('pipeline-percent');
        if (fill) fill.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct + '%';
    }

    // Auto-start analysis on an existing (already submitted) idea
    async function runExistingIdea(ideaId, mode) {
        if (isAnalyzing) return;
        isAnalyzing = true;
        var btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = t('idea.analyzing');
        clearResults();

        try {
            if (mode === 'quick') {
                showStatus('analyzing', '<span class="spinner"></span>' + (i18nLang === 'en' ? 'Quick validation in progress...' : '快速验证中...'));
                var analyzeResp = await fetch('/api/idea/analyze', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: ideaId }),
                });
                var analyzeData = await analyzeResp.json();
                if (analyzeData.status === 'ok') {
                    showStatus('done', i18nLang === 'en' ? 'Quick validation complete' : '快速验证完成');
                    displayResults(analyzeData.idea);
                    loadHistory();
                    showDiscussionPanel();
                } else {
                    showStatus('error', analyzeData.message || t('idea.analyzeFail'));
                }
            } else {
                document.getElementById('status-area').innerHTML = DOMPurify.sanitize(buildPipelineUI());
                await new Promise(function(resolve) {
                    var eventSource = new EventSource('/api/idea/' + ideaId + '/progress');
                    var pipelineStarted = false;
                    var timeout = setTimeout(function() { eventSource.close(); resolve(); }, 300000);

                    eventSource.onopen = function() {
                        if (!pipelineStarted) {
                            pipelineStarted = true;
                            fetch('/api/idea/pipeline', {
                                method: 'POST', headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ id: ideaId }),
                            });
                        }
                    };
                    eventSource.onmessage = function(e) {
                        try {
                            var progress = JSON.parse(e.data);
                            updatePipelineStep(progress.step_index, progress.status, progress.sub_step || null, progress.sub_progress || null, progress.message || null);
                        } catch(err) {}
                    };
                    eventSource.addEventListener('done', function() { clearTimeout(timeout); eventSource.close(); resolve(); });
                    eventSource.onerror = function() {
                        clearTimeout(timeout); eventSource.close();
                        if (!pipelineStarted) {
                            pipelineStarted = true;
                            fetch('/api/idea/pipeline', {
                                method: 'POST', headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ id: ideaId }),
                            });
                        }
                        resolve();
                    };
                });
                var reportResp = await fetch('/api/idea/' + ideaId + '/report');
                var reportData = await reportResp.json();
                if (reportData.status === 'ok') {
                    var fill = document.getElementById('pipeline-bar-fill');
                    var pctEl = document.getElementById('pipeline-percent');
                    if (fill) { fill.style.width = '100%'; fill.style.background = '#238636'; }
                    if (pctEl) pctEl.textContent = '100% ✓';
                    displayResults(reportData.report);
                    loadHistory();
                    showDiscussionPanel();
                } else {
                    showStatus('error', reportData.message || t('idea.analyzeFail'));
                }
            }
        } catch(e) {
            showStatus('error', t('idea.analyzeFail') + '：' + e.message);
        } finally {
            isAnalyzing = false;
            btn.disabled = false;
            btn.textContent = t('idea.submit');
        }
    }

    async function submitIdea() {
        const title = document.getElementById('idea-title').value.trim();
        const desc = document.getElementById('idea-desc').value.trim();
        if (!title) { alert(t('idea.alertTitle')); return; }
        if (!desc) { alert(t('idea.alertDesc')); return; }
        if (isAnalyzing) return;

        isAnalyzing = true;
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = t('idea.analyzing');
        clearResults();

        try {
            // Step 1: Submit idea
            const submitResp = await fetch('/api/idea/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description: desc, input_type: 'text' }),
            });
            if (!submitResp.ok) throw new Error(t('idea.serverError') + ' (' + submitResp.status + ')');
            const submitData = await submitResp.json();
            if (submitData.status !== 'ok') throw new Error(submitData.message || t('idea.submitFail'));

            currentIdeaId = submitData.id;

            if (analysisMode === 'quick') {
                // Quick mode: synchronous call to /api/idea/analyze
                showStatus('analyzing', '<span class="spinner"></span>' + (i18nLang === 'en' ? 'Quick validation in progress...' : '快速验证中...'));

                const analyzeResp = await fetch('/api/idea/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: submitData.id }),
                });
                const analyzeData = await analyzeResp.json();

                if (analyzeData.status === 'ok') {
                    showStatus('done', i18nLang === 'en' ? 'Quick validation complete' : '快速验证完成');
                    displayResults(analyzeData.idea);
                    loadHistory();
                    showDiscussionPanel();
                } else {
                    showStatus('error', analyzeData.message || t('idea.analyzeFail'));
                }
            } else {
                // Deep mode: 13-step pipeline with SSE progress
                // Show pipeline progress UI
                document.getElementById('status-area').innerHTML = DOMPurify.sanitize(buildPipelineUI());

                // Connect SSE FIRST, then start pipeline (avoids race condition)
                await new Promise(function(resolve, reject) {
                    var eventSource = new EventSource('/api/idea/' + submitData.id + '/progress');
                    var pipelineStarted = false;
                    var timeout = setTimeout(function() {
                        eventSource.close();
                        resolve();
                    }, 300000); // 5 min max

                    eventSource.onopen = function() {
                        // SSE connected — now safe to start pipeline
                        if (!pipelineStarted) {
                            pipelineStarted = true;
                            fetch('/api/idea/pipeline', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id: submitData.id }),
                            });
                        }
                    };

                    eventSource.onmessage = function(e) {
                        try {
                            var progress = JSON.parse(e.data);
                            updatePipelineStep(
                                progress.step_index,
                                progress.status,
                                progress.sub_step || null,
                                progress.sub_progress || null,
                                progress.message || null
                            );
                        } catch(err) {}
                    };

                    eventSource.addEventListener('done', function() {
                        clearTimeout(timeout);
                        eventSource.close();
                        resolve();
                    });

                    eventSource.onerror = function() {
                        clearTimeout(timeout);
                        eventSource.close();
                        // If pipeline wasn't started yet, start it without SSE
                        if (!pipelineStarted) {
                            pipelineStarted = true;
                            fetch('/api/idea/pipeline', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ id: submitData.id }),
                            });
                        }
                        resolve();
                    };
                });

                // Load final report
                const reportResp = await fetch('/api/idea/' + submitData.id + '/report');
                const reportData = await reportResp.json();

                if (reportData.status === 'ok') {
                    // Update pipeline bar to 100%
                    var fill = document.getElementById('pipeline-bar-fill');
                    var pctEl = document.getElementById('pipeline-percent');
                    if (fill) { fill.style.width = '100%'; fill.style.background = '#238636'; }
                    if (pctEl) pctEl.textContent = '100% ✓';

                    displayResults(reportData.report);
                    loadHistory();
                    showDiscussionPanel();
                } else {
                    showStatus('error', reportData.message || t('idea.analyzeFail'));
                }
            }
        } catch (e) {
            showStatus('error', t('idea.analyzeFail') + '：' + e.message);
        } finally {
            isAnalyzing = false;
            btn.disabled = false;
            btn.textContent = t('idea.submit');
        }
    }

    // 多维推演结果渲染：手风琴 UI
    function renderDeepReasoningUI(analysis) {
        var dims = [
            { key: 'scientific', icon: '🔬', label: '科学推导', color: '#58a6ff' },
            { key: 'dialectical', icon: '⚡', label: '辩证批判', color: '#f85149' },
            { key: 'epistemological', icon: '🔍', label: '知识审计', color: '#d2a8ff' },
            { key: 'phenomenological', icon: '🌊', label: '本质还原', color: '#3fb950' },
            { key: 'eastern', icon: '☯️', label: '减法思维', color: '#f0883e' },
            { key: 'topological', icon: '🔗', label: '跨域映射', color: '#79c0ff' },
        ];

        // 按标记分割各部分
        var sections = analysis.split('---');
        var synthesisSection = '';
        var dimSections = {};

        sections.forEach(function(sec) {
            sec = sec.trim();
            if (sec.indexOf('跨维度合成') >= 0) {
                synthesisSection = sec.replace(/^##\s*🔮\s*跨维度合成\s*/, '');
            }
            dims.forEach(function(d) {
                if (sec.indexOf(d.label) >= 0 && sec.indexOf('(' + d.key + ')') >= 0) {
                    dimSections[d.key] = sec.replace(new RegExp('^##\\s*' + d.icon + '\\s*' + d.label + '.*\\n*'), '');
                }
            });
        });

        var html = '<div class="analysis-result" style="padding:0;">';

        // 合成结论（始终展开）
        if (synthesisSection) {
            html += '<div style="padding:16px;background:linear-gradient(135deg,#161b22,#1c2333);border:1px solid #d2a8ff33;border-radius:8px;margin-bottom:16px;">'
                + '<h3 style="color:#d2a8ff;margin:0 0 12px;">🔮 跨维度合成</h3>'
                + '<div style="color:#c9d1d9;line-height:1.8;">' + renderMarkdown(synthesisSection) + '</div></div>';
        }

        // 6 个维度手风琴
        html += '<div style="display:flex;flex-direction:column;gap:4px;">';
        dims.forEach(function(d, i) {
            var content = dimSections[d.key] || '';
            var id = 'dim-' + d.key;
            html += '<div style="border:1px solid #30363d;border-radius:6px;overflow:hidden;">'
                + '<div onclick="toggleDimension(\'' + id + '\')" style="padding:10px 14px;background:#161b22;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;">'
                + '<span style="color:' + d.color + ';font-size:1.1em;">' + d.icon + '</span>'
                + '<span style="color:' + d.color + ';font-weight:600;">' + d.label + '</span>'
                + '<span id="' + id + '-arrow" style="margin-left:auto;color:#484f58;transition:transform 0.2s;">▶</span>'
                + '</div>'
                + '<div id="' + id + '" style="display:none;padding:14px;background:#0d1117;color:#c9d1d9;line-height:1.8;max-height:500px;overflow-y:auto;">'
                + (content ? renderMarkdown(content) : '<p style="color:#484f58;">此维度未产出结果</p>')
                + '</div></div>';
        });
        html += '</div></div>';
        return html;
    }

    function displayResults(idea) {
        if (idea.novelty_score != null) {
            const scoreClass = idea.novelty_score >= 70 ? 'score-high' : idea.novelty_score >= 40 ? 'score-mid' : 'score-low';
            const scoreLabel = idea.novelty_score >= 70 ? t('idea.scoreHigh') : idea.novelty_score >= 40 ? t('idea.scoreMid') : t('idea.scoreLow');
            document.getElementById('score-area').innerHTML = DOMPurify.sanitize(
                '<div class="score-display">' +
                '<div class="score-number ' + scoreClass + '" style="background:transparent;">' + Math.round(idea.novelty_score * 10) / 10 + '</div>' +
                '<div class="score-label">' + (i18nLang === 'en' ? 'Novelty Score / 100 — ' : '新颖性评分 / 100 — ') + scoreLabel + '</div>' +
                '</div>');
        }

        if (idea.analysis) {
            // 检测是否为多维推演报告（包含维度标记）
            var isDeepReasoning = idea.analysis.indexOf('多维深度推演报告') >= 0;
            if (isDeepReasoning) {
                document.getElementById('analysis-area').innerHTML = DOMPurify.sanitize(renderDeepReasoningUI(idea.analysis));
            } else {
                document.getElementById('analysis-area').innerHTML = DOMPurify.sanitize(
                    '<div class="analysis-result">' + renderMarkdown(idea.analysis) + '</div>');
            }
        }

        let findingsHtml = '';
        const webResults = idea.web_results || [];
        if (webResults.length > 0) {
            findingsHtml += '<div class="findings-section"><h3>' + t('idea.webResults') + '</h3>';
            webResults.forEach(function(r) {
                findingsHtml += '<div class="finding-card">' +
                    '<div class="title">' + esc(r.title) + '</div>' +
                    '<div class="snippet">' + esc(r.snippet) + '</div>' +
                    (r.link ? '<a href="' + esc(r.link) + '" target="_blank" rel="noopener">🔗</a>' : '') +
                    '</div>';
            });
            findingsHtml += '</div>';
        }

        const patentResults = idea.patent_results || [];
        if (patentResults.length > 0) {
            findingsHtml += '<div class="findings-section"><h3>' + t('idea.patentResults') + '</h3>';
            patentResults.forEach(function(p) {
                const sourceTag = p.source === 'google_patents'
                    ? '<span class="source-tag">Google Patents</span>'
                    : p.source === 'local'
                    ? '<span class="source-tag">Local</span>'
                    : '';
                findingsHtml += '<div class="finding-card">' +
                    '<div class="title">[' + esc(p.patent_number) + '] ' + esc(p.title) + ' ' + sourceTag + '</div>' +
                    '<div class="snippet">' + esc(p.applicant || '') + ' | ' + esc(p.filing_date || '') + '<br>' + esc((p.abstract || '').substring(0, 200)) + '</div>' +
                    '</div>';
            });
            findingsHtml += '</div>';
        }
        document.getElementById('findings-area').innerHTML = DOMPurify.sanitize(findingsHtml);

        // 加载证据链 / Load evidence chain
        loadEvidenceChain(idea.id);
    }

    async function loadEvidenceChain(ideaId) {
        var panel = document.getElementById('evidence-panel');
        var list = document.getElementById('evidence-list');
        var countEl = document.getElementById('evidence-count');
        try {
            var resp = await fetch('/api/idea/' + ideaId + '/evidence');
            var data = await resp.json();
            if (data.status !== 'ok' || !data.evidence || data.evidence.length === 0) {
                panel.style.display = 'none';
                return;
            }
            panel.style.display = 'block';
            countEl.textContent = data.evidence.length;
            list.innerHTML = '';
            data.evidence.forEach(function(ev) {
                var card = document.createElement('div');
                card.style.cssText = 'margin-bottom:8px;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;';

                // 置信度标签颜色
                var confColor = ev.confidence >= 0.7 ? '#3fb950' : ev.confidence >= 0.3 ? '#d29922' : '#f85149';
                var confPct = Math.round(ev.confidence * 100);

                // 关系标签
                var relLabel = ev.relation === 'supports' ? '支撑' : ev.relation === 'contradicts' ? '矛盾' : '部分相关';
                var relColor = ev.relation === 'supports' ? '#3fb950' : ev.relation === 'contradicts' ? '#f85149' : '#d29922';

                var header = document.createElement('div');
                header.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;';

                var claimSpan = document.createElement('span');
                claimSpan.style.cssText = 'color:#c9d1d9;font-size:0.9em;font-weight:bold;flex:1;';
                claimSpan.textContent = ev.claim;

                var badges = document.createElement('span');
                badges.style.cssText = 'display:flex;gap:6px;flex-shrink:0;';
                badges.innerHTML = DOMPurify.sanitize(
                    '<span style="background:' + confColor + '22;color:' + confColor + ';padding:1px 6px;border-radius:3px;font-size:0.75em;">' + confPct + '%</span>' +
                    '<span style="background:' + relColor + '22;color:' + relColor + ';padding:1px 6px;border-radius:3px;font-size:0.75em;">' + relLabel + '</span>'
                );

                header.appendChild(claimSpan);
                header.appendChild(badges);
                card.appendChild(header);

                // 摘录
                if (ev.excerpt) {
                    var excerptDiv = document.createElement('div');
                    excerptDiv.style.cssText = 'color:#8b949e;font-size:0.82em;line-height:1.4;margin-bottom:4px;';
                    excerptDiv.textContent = ev.excerpt.length > 200 ? ev.excerpt.substring(0, 200) + '...' : ev.excerpt;
                    card.appendChild(excerptDiv);
                }

                // 来源
                var meta = document.createElement('div');
                meta.style.cssText = 'color:#6e7681;font-size:0.75em;';
                if (ev.source_url) {
                    var link = document.createElement('a');
                    link.href = ev.source_url;
                    link.target = '_blank';
                    link.style.color = '#58a6ff';
                    link.textContent = ev.source_title;
                    meta.appendChild(link);
                } else {
                    meta.textContent = ev.source_title;
                }
                var stepSpan = document.createElement('span');
                stepSpan.textContent = ' | ' + ev.produced_by;
                meta.appendChild(stepSpan);
                card.appendChild(meta);

                list.appendChild(card);
            });
        } catch(e) {
            panel.style.display = 'none';
        }
    }

    async function loadHistory() {
        try {
            const resp = await fetch('/api/idea/list');
            if (!resp.ok) return;
            const data = await resp.json();
            if (data.status !== 'ok' || !data.ideas || !data.ideas.length) {
                var emptyHint = document.createElement('p');
                emptyHint.className = 'hint';
                emptyHint.style.fontSize = '0.85em';
                emptyHint.textContent = t('idea.historyEmpty');
                var histList = document.getElementById('history-list');
                histList.innerHTML = '';
                histList.appendChild(emptyHint);
                return;
            }

            const list = document.getElementById('history-list');
            list.innerHTML = '';
            data.ideas.forEach(function(idea) {
                const scoreClass = idea.novelty_score == null ? '' :
                    idea.novelty_score >= 70 ? 'score-high' : idea.novelty_score >= 40 ? 'score-mid' : 'score-low';
                const scoreText = idea.novelty_score != null ? idea.novelty_score : '-';
                const active = idea.id === currentIdeaId ? ' active' : '';
                var dateStr = (idea.created_at || '').substring(0, 10);
                var timeStr = (idea.created_at || '').substring(11, 16);
                var snippet = (idea.description || '').substring(0, 40);
                if ((idea.description || '').length > 40) snippet += '…';
                var chatBadge = idea.message_count > 0 ? ' 💬' + idea.message_count : '';

                var item = document.createElement('div');
                item.className = 'history-item' + active;
                item.style.position = 'relative';

                var clickDiv = document.createElement('div');
                clickDiv.style.cursor = 'pointer';
                clickDiv.setAttribute('data-idea-id', idea.id);
                clickDiv.addEventListener('click', function() { loadIdea(idea.id); });

                var titleDiv = document.createElement('div');
                titleDiv.className = 'history-title';
                titleDiv.textContent = idea.title;
                clickDiv.appendChild(titleDiv);

                if (snippet) {
                    var snippetDiv = document.createElement('div');
                    snippetDiv.style.cssText = 'font-size:0.78em;color:#8b949e;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;';
                    snippetDiv.textContent = snippet;
                    clickDiv.appendChild(snippetDiv);
                }

                var metaDiv = document.createElement('div');
                metaDiv.className = 'history-meta';
                var dateSpan = document.createElement('span');
                dateSpan.textContent = dateStr + ' ' + timeStr;
                var scoreSpan = document.createElement('span');
                scoreSpan.innerHTML = DOMPurify.sanitize(chatBadge + ' <span class="score-badge ' + scoreClass + '">' + scoreText + '</span>');
                metaDiv.appendChild(dateSpan);
                metaDiv.appendChild(scoreSpan);
                clickDiv.appendChild(metaDiv);

                item.appendChild(clickDiv);

                var delBtn = document.createElement('button');
                delBtn.style.cssText = 'position:absolute;top:4px;right:4px;background:none;border:none;color:#484f58;cursor:pointer;font-size:0.8em;padding:2px 6px;';
                delBtn.title = '删除';
                delBtn.textContent = '✕';
                delBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteIdea(idea.id, idea.title); });
                item.appendChild(delBtn);

                list.appendChild(item);
            });
        } catch (e) {
            console.error('Failed to load history:', e);
        }
    }

    async function deleteIdea(id, title) {
        if (!confirm('确定删除「' + title + '」及其所有讨论记录？')) return;
        try {
            const resp = await fetch('/api/idea/' + encodeURIComponent(id) + '/delete', { method: 'POST' });
            const data = await resp.json();
            if (data.status === 'ok') {
                if (currentIdeaId === id) {
                    currentIdeaId = null;
                    document.getElementById('idea-title').value = '';
                    document.getElementById('idea-desc').value = '';
                    document.getElementById('score-area').innerHTML = '';
                    document.getElementById('analysis-area').innerHTML = '';
                    document.getElementById('chat-messages').innerHTML = '';
                }
                loadHistory();
            } else {
                alert(data.message || '删除失败');
            }
        } catch(e) {
            alert('请求失败: ' + e.message);
        }
    }

    async function loadIdea(id) {
        try {
            const resp = await fetch('/api/idea/' + encodeURIComponent(id));
            if (!resp.ok) return;
            const data = await resp.json();
            if (data.status !== 'ok') return;

            currentIdeaId = id;
            const idea = data.idea;
            document.getElementById('idea-title').value = idea.title || '';
            document.getElementById('idea-desc').value = idea.description || '';

            if (idea.status === 'done') {
                showStatus('done', t('idea.done'));
                displayResults(idea);
                showDiscussionPanel();
            } else if (idea.status === 'error') {
                showStatus('error', idea.analysis || t('idea.analyzeFail'));
                showDiscussionPanel();
            } else {
                showStatus('analyzing', '<span class="spinner"></span>' + t('idea.analyzing'));
            }

            document.querySelectorAll('.history-item').forEach(function(el) { el.classList.remove('active'); });
            if (event && event.target) {
                var item = event.target.closest('.history-item');
                if (item) item.classList.add('active');
            }

            // Auto-scroll to discussion panel so user can see conversation history
            setTimeout(function() {
                var panel = document.getElementById('discussion-panel');
                if (panel && panel.style.display !== 'none') {
                    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 300);
        } catch (e) {
            console.error('Failed to load idea:', e);
        }
    }

    function renderMarkdown(text) {
        return text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h3 style="font-size:1.1em">$1</h3>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/^\- (.+)$/gm, '<li>$1</li>')
            .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
            .replace(/\n{2,}/g, '</p><p>')
            .replace(/\n/g, '<br>')
            .replace(/^/, '<p>').replace(/$/, '</p>');
    }

    function showDiscussionPanel() {
        if (!currentIdeaId) return;
        document.getElementById('discussion-panel').style.display = 'block';
        loadChatMessages();
    }

    async function loadChatMessages() {
        if (!currentIdeaId) return;
        try {
            var res = await fetch('/api/idea/' + currentIdeaId + '/messages');
            var data = await res.json();
            var container = document.getElementById('chat-messages');
            if (!data.messages || data.messages.length === 0) {
                var chatHintP = document.createElement('p');
                chatHintP.style.cssText = 'color:#8b949e; font-size:0.9em; text-align:center;';
                chatHintP.textContent = '提出你的问题，开始讨论这个创意';
                container.innerHTML = '';
                container.appendChild(chatHintP);
                return;
            }
            var html = '';
            data.messages.forEach(function(msg) {
                var isUser = msg.role === 'user';
                var bg = isUser ? '#1f2937' : '#0d1117';
                var border = isUser ? '#30363d' : '#1f6feb';
                var label = isUser ? '👤 你' : '🤖 AI';
                var time = msg.created_at ? msg.created_at.substring(5, 16) : '';
                html += '<div style="margin-bottom:10px; padding:10px 14px; background:' + bg + '; border-radius:8px; border-left:3px solid ' + border + ';">' +
                    '<div style="display:flex; justify-content:space-between; margin-bottom:4px;">' +
                    '<span style="font-size:0.8em; color:#58a6ff; font-weight:bold;">' + label + '</span>' +
                    '<span style="font-size:0.75em; color:#8b949e;">' + esc(time) + '</span></div>' +
                    '<div style="color:#c9d1d9; white-space:pre-wrap; line-height:1.6; font-size:0.92em;">' + renderMarkdown(msg.content) + '</div></div>';
            });
            container.innerHTML = DOMPurify.sanitize(html);
            container.scrollTop = container.scrollHeight;
        } catch (e) {
            console.error('Failed to load messages:', e);
        }

        // Also load summary if exists
        try {
            var ideaRes = await fetch('/api/idea/' + currentIdeaId);
            var ideaData = await ideaRes.json();
            var sumDiv = document.getElementById('discussion-summary');
            if (ideaData.discussion_summary && ideaData.discussion_summary.length > 0) {
                sumDiv.style.display = 'block';
                sumDiv.innerHTML = DOMPurify.sanitize('<div style="font-size:0.8em; color:#58a6ff; margin-bottom:4px; font-weight:bold;">📋 讨论总结</div>' +
                    '<div style="color:#c9d1d9; font-size:0.9em; line-height:1.6;">' + renderMarkdown(ideaData.discussion_summary) + '</div>');
            } else {
                sumDiv.style.display = 'none';
            }
        } catch(e) {}
    }

    var chatAttachedFiles = [];

    // 粘贴图片支持
    document.getElementById('chat-input').addEventListener('paste', function(e) {
        var items = (e.clipboardData || e.originalEvent.clipboardData).items;
        var hasImage = false;
        for (var i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                hasImage = true;
                var blob = items[i].getAsFile();
                var ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                var ext = blob.type.split('/')[1] || 'png';
                var file = new File([blob], 'paste-' + ts + '.' + ext, { type: blob.type });
                chatAttachedFiles.push(file);
            }
        }
        if (hasImage) {
            e.preventDefault();
            renderChatAttachments();
        }
    });

    function renderChatAttachments() {
        var container = document.getElementById('chat-attachments');
        if (chatAttachedFiles.length === 0) {
            container.style.display = 'none';
            container.innerHTML = '';
            return;
        }
        container.style.display = 'block';
        container.innerHTML = '';
        chatAttachedFiles.forEach(function(f, i) {
            var icon = f.type.startsWith('image/') ? '🖼️' : '📄';
            var size = (f.size / 1024).toFixed(1) + 'KB';
            var span = document.createElement('span');
            span.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:#21262d;padding:3px 8px;border-radius:4px;margin:2px;color:#8b949e;';
            span.textContent = icon + ' ' + f.name + ' (' + size + ')';
            // 图片预览缩略图
            if (f.type.startsWith('image/')) {
                var thumb = document.createElement('img');
                thumb.style.cssText = 'height:20px;border-radius:2px;margin-right:2px;';
                thumb.src = URL.createObjectURL(f);
                span.insertBefore(thumb, span.firstChild);
            }
            var removeBtn = document.createElement('button');
            removeBtn.style.cssText = 'background:none;border:none;color:#f85149;cursor:pointer;padding:0 2px;';
            removeBtn.textContent = '×';
            removeBtn.setAttribute('onclick', 'removeChatFile(' + i + ')');
            span.appendChild(removeBtn);
            container.appendChild(span);
        });
    }

    function handleChatFileSelect(input) {
        var files = Array.from(input.files);
        files.forEach(function(f) {
            if (f.size > 10 * 1024 * 1024) {
                alert('文件 ' + f.name + ' 超过 10MB 限制');
                return;
            }
            chatAttachedFiles.push(f);
        });
        renderChatAttachments();
        input.value = '';
    }

    function removeChatFile(idx) {
        chatAttachedFiles.splice(idx, 1);
        renderChatAttachments();
    }

    async function sendChatMessage() {
        var input = document.getElementById('chat-input');
        var msg = input.value.trim();
        var hasFiles = chatAttachedFiles.length > 0;
        if ((!msg && !hasFiles) || !currentIdeaId) return;
        input.value = '';
        input.disabled = true;

        // Show user message immediately
        var container = document.getElementById('chat-messages');
        var placeholder = container.querySelector('p');
        if (placeholder) placeholder.remove();
        var userMsgDiv = document.createElement('div');
        userMsgDiv.style.cssText = 'margin-bottom:10px; padding:10px 14px; background:#1f2937; border-radius:8px; border-left:3px solid #30363d;';
        var userLabel = document.createElement('span');
        userLabel.style.cssText = 'font-size:0.8em; color:#58a6ff; font-weight:bold;';
        userLabel.textContent = '👤 你';
        var userBody = document.createElement('div');
        userBody.style.cssText = 'color:#c9d1d9; margin-top:4px; white-space:pre-wrap;';
        userBody.textContent = msg;
        userMsgDiv.appendChild(userLabel);
        userMsgDiv.appendChild(userBody);
        container.appendChild(userMsgDiv);

        // Show thinking indicator
        var thinkDiv = document.createElement('div');
        thinkDiv.id = 'thinking-indicator';
        thinkDiv.style.cssText = 'margin-bottom:10px; padding:10px 14px; background:#0d1117; border-radius:8px; border-left:3px solid #1f6feb;';
        var thinkSpan = document.createElement('span');
        thinkSpan.style.cssText = 'color:#58a6ff; font-size:0.9em;';
        thinkSpan.textContent = '🤖 思考中...';
        thinkDiv.appendChild(thinkSpan);
        container.appendChild(thinkDiv);
        container.scrollTop = container.scrollHeight;

        try {
            var res = await fetch('/api/idea/' + currentIdeaId + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });
            var data = await res.json();
            var indicator = document.getElementById('thinking-indicator');
            if (indicator) indicator.remove();

            if (data.status === 'ok' && data.message) {
                var aiMsgDiv = document.createElement('div');
                aiMsgDiv.style.cssText = 'margin-bottom:10px; padding:10px 14px; background:#0d1117; border-radius:8px; border-left:3px solid #1f6feb;';
                var aiLabel = document.createElement('span');
                aiLabel.style.cssText = 'font-size:0.8em; color:#58a6ff; font-weight:bold;';
                aiLabel.textContent = '🤖 AI';
                var aiBody = document.createElement('div');
                aiBody.style.cssText = 'color:#c9d1d9; margin-top:4px; white-space:pre-wrap; line-height:1.6;';
                aiBody.innerHTML = DOMPurify.sanitize(renderMarkdown(data.message.content));
                aiMsgDiv.appendChild(aiLabel);
                aiMsgDiv.appendChild(aiBody);
                container.appendChild(aiMsgDiv);
            } else {
                var errDiv = document.createElement('div');
                errDiv.style.cssText = 'padding:10px; color:#f85149;';
                errDiv.textContent = '错误: ' + (data.error || '未知错误');
                container.appendChild(errDiv);
            }
            container.scrollTop = container.scrollHeight;
        } catch (e) {
            var ind = document.getElementById('thinking-indicator');
            if (ind) ind.remove();
            var reqErrDiv = document.createElement('div');
            reqErrDiv.style.cssText = 'padding:10px; color:#f85149;';
            reqErrDiv.textContent = '请求失败: ' + e.message;
            container.appendChild(reqErrDiv);
        }
        input.disabled = false;
        input.focus();
    }

    async function summarizeDiscussion() {
        if (!currentIdeaId) return;
        var btn = document.getElementById('summary-btn');
        btn.textContent = '⏳ 生成中...';
        btn.disabled = true;
        try {
            var res = await fetch('/api/idea/' + currentIdeaId + '/summarize', { method: 'POST' });
            var data = await res.json();
            if (data.status === 'ok') {
                var sumDiv = document.getElementById('discussion-summary');
                sumDiv.style.display = 'block';
                sumDiv.innerHTML = DOMPurify.sanitize('<div style="font-size:0.8em; color:#58a6ff; margin-bottom:4px; font-weight:bold;">📋 讨论总结</div>' +
                    '<div style="color:#c9d1d9; font-size:0.9em; line-height:1.6;">' + renderMarkdown(data.summary) + '</div>');
            } else {
                var sumDiv = document.getElementById('discussion-summary');
                sumDiv.style.display = 'block';
                var sumErrDiv = document.createElement('div');
                sumErrDiv.style.cssText = 'color:#f0ad4e; font-size:0.85em; padding:8px;';
                sumErrDiv.textContent = '💡 ' + (data.error || '生成总结失败') + '，请先在下方输入框和 AI 讨论几轮后再生成总结。';
                sumDiv.innerHTML = '';
                sumDiv.appendChild(sumErrDiv);
            }
        } catch(e) {
            alert('请求失败: ' + e.message);
        }
        btn.textContent = '📋 生成总结';
        btn.disabled = false;
    }

    // Init
    applyI18nCommon();
    loadHistory();

    // Handle URL params from index.html redirect (?id=xxx&autostart=quick|deep)
    (async function() {
        var params = new URLSearchParams(window.location.search);
        var ideaId = params.get('id');
        var autostart = params.get('autostart');
        if (ideaId) {
            await loadIdea(ideaId);
            if (autostart === 'quick' || autostart === 'deep') {
                setAnalysisMode(autostart);
                // Auto-trigger analysis if idea is not already done/error
                var statusEl = document.querySelector('#status-area .status-done, #status-area .status-error');
                if (!statusEl && !isAnalyzing && currentIdeaId) {
                    runExistingIdea(currentIdeaId, autostart);
                }
            }
        }
    })();
    </script>
</body>
</html>
