apply plugin: 'com.android.application'

android {
    namespace 'com.patenthub.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.patenthub.app"
        minSdk 24
        targetSdk 34
        versionCode 31
        versionName "0.3.1"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
